<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow"><meta name="googlebot" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竹節蟲資料庫 · 後台</title>
<style>
  :root{
    --bg:#f3f7fa; --card:#fff; --accent:#2f6f8f; --accent-light:#e6f0f5; --accent2:#1f4f66;
    --text:#1a2e38; --muted:#5a7686; --border:#c5d7e0; --ok:#2e7d32; --warn:#b26a00; --ng:#c62828;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--accent);color:#fff;padding:.8rem 1.3rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  header h1{font-size:1.15rem;}
  header .nav{margin-left:auto;display:flex;gap:.6rem;align-items:center;}
  header .nav a{color:#fff;opacity:.85;text-decoration:none;font-size:.85rem;}
  header .nav a:hover{opacity:1;}
  #whoami{font-size:.8rem;opacity:.9;}
  .wrap{max-width:980px;margin:1.5rem auto;padding:0 1.1rem;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1.2rem;}
  h2{font-size:1.05rem;margin-bottom:.7rem;color:var(--accent2);}
  p.hint{font-size:.85rem;color:var(--muted);line-height:1.7;margin-bottom:.8rem;}
  input,textarea,button,select{font-family:inherit;font-size:.9rem;}
  input[type=text],input[type=password],textarea,select{
    width:100%;padding:.55rem .7rem;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
  textarea{min-height:70px;resize:vertical;}
  .btn{padding:.55rem 1rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;}
  .btn:hover{background:var(--accent2);}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn.danger{background:var(--ng);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}
  .tabs{display:flex;gap:.4rem;margin-bottom:1rem;}
  .tab{padding:.5rem 1rem;border-radius:8px;cursor:pointer;background:var(--card);border:1px solid var(--border);font-weight:600;color:var(--muted);}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .msg{padding:.6rem .8rem;border-radius:8px;font-size:.85rem;margin-top:.7rem;display:none;}
  .msg.ok{background:#e7f4e8;color:var(--ok);display:block;}
  .msg.err{background:#fdeaea;color:var(--ng);display:block;}
  .msg.info{background:var(--accent-light);color:var(--accent2);display:block;}
  .rec-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.7rem;margin-top:.9rem;}
  .rec{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;cursor:pointer;transition:border-color .15s;}
  .rec:hover{border-color:var(--accent);}
  .rec img{width:100%;height:120px;object-fit:cover;background:var(--accent-light);}
  .rec .rb{padding:.5rem .6rem;}
  .rec .sp{font-weight:600;font-size:.85rem;color:var(--accent2);}
  .rec .sci{font-size:.72rem;color:var(--muted);font-style:italic;}
  .rec .au{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
  .rec .corr{font-size:.6rem;background:var(--accent2);color:#fff;border-radius:4px;padding:.05rem .3rem;margin-left:.3rem;}
  .field{margin-bottom:.7rem;}
  .field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.25rem;}
  .overlay{position:fixed;inset:0;background:#0007;display:none;align-items:center;justify-content:center;padding:1rem;z-index:50;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:460px;width:100%;padding:1.3rem;}
  .modal h3{font-size:1rem;margin-bottom:.9rem;color:var(--accent2);}
  .note-item{display:flex;gap:.5rem;align-items:flex-start;background:var(--accent-light);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:.5rem .7rem;margin-bottom:.5rem;font-size:.85rem;}
  .note-item button{margin-left:auto;flex:0 0 auto;}
  #publishBar{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:.8rem 1.1rem;display:flex;align-items:center;gap:.8rem;}
  #dirtyDot{font-size:.85rem;color:var(--warn);}
  .count{font-size:.78rem;color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>🌿 竹節蟲資料庫 · 後台</h1>
  <div class="nav">
    <a href="index.html">← 回網站</a>
    <span id="whoami"></span>
    <a href="#" id="logoutBtn" style="display:none">登出</a>
  </div>
</header>

<div class="wrap">

  <!-- 尚未設定後端 -->
  <div class="card" id="notReady" hidden>
    <h2>⚙️ 後端尚未設定</h2>
    <p class="hint">這個後台還沒接上資料庫。請先完成 Firebase 設定，把設定填進 <code>backend.json</code> 後即可使用。</p>
  </div>

  <!-- 登入 -->
  <div class="card" id="loginCard" hidden>
    <h2>🔑 登入</h2>
    <p class="hint">輸入後台密碼即可編輯。密碼由管理者統一提供。</p>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwInput" placeholder="後台密碼" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn">登入</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- 主程式 -->
  <div id="app" hidden>
    <div class="tabs">
      <div class="tab active" data-tab="fix">🔧 修正鑑定</div>
      <div class="tab" data-tab="notes">🎯 補充特徵</div>
    </div>

    <div class="card" id="tab-fix">
      <h2>修正抓錯的鑑定</h2>
      <p class="hint">搜尋要修正的紀錄（作者 / 物種 / 學名），點卡片編輯正確的中文名與學名。發布後全站約幾秒內更新。</p>
      <input type="text" id="fixSearch" placeholder="🔍 搜尋作者、物種、學名…（至少 1 字）">
      <div class="count" id="fixCount"></div>
      <div class="rec-list" id="recList"></div>
    </div>

    <div class="card" id="tab-notes" hidden>
      <h2>補充鑑定特徵</h2>
      <p class="hint">選一個物種，加入辨識特徵。會顯示在「物種圖鑑」該物種的「🔧 後台補充特徵」區。</p>
      <div class="field">
        <label>選擇物種</label>
        <input type="text" id="spSearch" placeholder="🔍 搜尋物種或學名…" autocomplete="off">
        <select id="spSelect" size="8" style="margin-top:.5rem"></select>
      </div>
      <div id="noteEditor" hidden>
        <div id="noteList"></div>
        <div class="field">
          <label>新增一條特徵</label>
          <textarea id="noteInput" placeholder="例如：翅膀有一條黑色斜帶，是與近似種最快的分辨點。"></textarea>
        </div>
        <button class="btn" id="addNoteBtn">＋ 新增特徵</button>
      </div>
    </div>
  </div>
</div>

<div id="publishBar" hidden>
  <span id="dirtyDot"></span>
  <span class="count" id="pubCount"></span>
  <button class="btn" id="publishBtn" style="margin-left:auto" disabled>💾 發布到網站</button>
</div>

<div class="overlay" id="fixOverlay">
  <div class="modal">
    <h3>修正鑑定</h3>
    <div id="fixPreview"></div>
    <div class="field"><label>物種中文名</label><input type="text" id="fixCommon"></div>
    <div class="field"><label>學名</label><input type="text" id="fixSci" placeholder="例如 Nephrotoma sp."></div>
    <div class="row" style="margin-top:.5rem">
      <button class="btn" id="fixSave">儲存修正</button>
      <button class="btn ghost" id="fixCancel">取消</button>
      <button class="btn danger" id="fixReset" style="margin-left:auto">還原原鑑定</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
let cfg = null, db = null, auth = null;
let overrides = { records: {}, species_notes: {} };
let data = { records: [], species: [] };
let dirty = false, editingPid = null, curSpKey = null;
const $ = id => document.getElementById(id);
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

async function boot(){
  try { cfg = await (await fetch("backend.json?_="+Date.now())).json(); } catch(e){ cfg=null; }
  if(!cfg || !cfg.projectId || !cfg.apiKey){ $("notReady").hidden = false; return; }
  firebase.initializeApp({ apiKey: cfg.apiKey, authDomain: cfg.authDomain, projectId: cfg.projectId });
  auth = firebase.auth(); db = firebase.firestore();
  auth.onAuthStateChanged(async user => {
    if(user){ await onLoggedIn(); }
    else { $("loginCard").hidden = false; $("app").hidden = true; $("publishBar").hidden = true; $("logoutBtn").style.display="none"; }
  });
}

async function login(pw){
  const msg = $("loginMsg"); msg.className="msg info"; msg.textContent="登入中…";
  try {
    await auth.signInWithEmailAndPassword(cfg.sharedEmail, pw);
    msg.className="msg"; msg.textContent="";
  } catch(e){
    msg.className="msg err";
    msg.textContent = "登入失敗：" + (e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"?"密碼錯誤":e.message);
  }
}

async function onLoggedIn(){
  $("loginCard").hidden = true; $("app").hidden = false; $("publishBar").hidden = false;
  $("logoutBtn").style.display = ""; $("whoami").textContent = "已登入";
  data = await (await fetch("admin_data.json?_="+Date.now())).json();
  try {
    const snap = await db.doc(cfg.docPath).get();
    const raw = snap.exists ? snap.data().data : null;
    overrides = raw ? JSON.parse(raw) : { records:{}, species_notes:{} };
  } catch(e){ overrides = { records:{}, species_notes:{} }; }
  overrides.records = overrides.records || {};
  overrides.species_notes = overrides.species_notes || {};
  renderFix(); buildSpeciesSelect(); updateDirty(false);
}

// ── 修正鑑定 ──
function effSpecies(rec){
  const o = overrides.records[rec.post_id];
  return { common: o&&o.species?o.species:rec.species, sci: o&&o.scientific!=null?o.scientific:rec.scientific, corrected: !!o };
}
function renderFix(){
  const q = ($("fixSearch").value||"").trim().toLowerCase();
  const list = $("recList");
  if(!q){ list.innerHTML=""; $("fixCount").textContent="輸入關鍵字以搜尋紀錄"; return; }
  const hits = data.records.filter(r=>{
    const e = effSpecies(r);
    return (r.author+" "+e.common+" "+e.sci+" "+r.post_id+" "+r.family).toLowerCase().includes(q);
  }).slice(0,60);
  $("fixCount").textContent = `${hits.length} 筆${hits.length>=60?"（僅顯示前 60）":""}`;
  list.innerHTML = hits.map(r=>{
    const e = effSpecies(r);
    const img = r.img?`<img src="images/${r.img}" loading="lazy" onerror="this.style.display='none'">`:`<div style="height:120px;display:grid;place-items:center;font-size:2rem;background:var(--accent-light)">🪰</div>`;
    return `<div class="rec" onclick="openFix('${r.post_id}')">${img}
      <div class="rb"><div class="sp">${esc(e.common||"（未知）")}${e.corrected?'<span class="corr">已修訂</span>':''}</div>
      <div class="sci">${esc(e.sci||"")}</div><div class="au">${esc(r.author||"")}</div></div></div>`;
  }).join("");
}
function openFix(pid){
  const r = data.records.find(x=>x.post_id===pid); if(!r) return;
  editingPid = pid; const e = effSpecies(r);
  $("fixPreview").innerHTML = (r.img?`<img src="images/${r.img}" style="width:100%;max-height:200px;object-fit:contain;background:var(--accent-light);border-radius:8px;margin-bottom:.7rem">`:"")
    + `<p class="hint">作者：${esc(r.author)}　·　<a href="${r.post_url}" target="_blank">原貼文 ↗</a><br>原始鑑定：${esc(r.species||"（未鑑定）")} ${esc(r.scientific||"")}</p>`;
  $("fixCommon").value = e.common||""; $("fixSci").value = e.sci||"";
  $("fixOverlay").classList.add("open");
}
$("fixSave").onclick = ()=>{
  const r = data.records.find(x=>x.post_id===editingPid);
  const common = $("fixCommon").value.trim(), sci = $("fixSci").value.trim();
  if(common===(r.species||"") && sci===(r.scientific||"")){ delete overrides.records[editingPid]; }
  else { overrides.records[editingPid] = { species: common, scientific: sci }; }
  $("fixOverlay").classList.remove("open"); updateDirty(true); renderFix();
};
$("fixReset").onclick = ()=>{ delete overrides.records[editingPid]; $("fixOverlay").classList.remove("open"); updateDirty(true); renderFix(); };
$("fixCancel").onclick = ()=> $("fixOverlay").classList.remove("open");
$("fixSearch").oninput = renderFix;

// ── 補充特徵 ──
function buildSpeciesSelect(){
  const q = ($("spSearch").value||"").trim().toLowerCase();
  const sel = $("spSelect");
  const items = data.species.filter(s=> !q || (s.common+" "+s.scientific+" "+s.family).toLowerCase().includes(q)).slice(0,300);
  sel.innerHTML = items.map(s=>{
    const n = (overrides.species_notes[s.key]||[]).length;
    const label = (s.common||s.key) + (s.scientific&&s.scientific!==s.common?` — ${s.scientific}`:"") + `　[${s.family.split(" ")[0]}]` + (n?`　🔧${n}`:"");
    return `<option value="${esc(s.key)}">${esc(label)}</option>`;
  }).join("");
}
$("spSearch").oninput = buildSpeciesSelect;
$("spSelect").onchange = ()=>{ curSpKey = $("spSelect").value; renderNotes(); };
function renderNotes(){
  $("noteEditor").hidden = !curSpKey; if(!curSpKey) return;
  const arr = overrides.species_notes[curSpKey] || [];
  $("noteList").innerHTML = arr.length ? arr.map((n,i)=>
    `<div class="note-item"><span>${esc(n)}</span><button class="btn danger" onclick="delNote(${i})">刪</button></div>`).join("")
    : `<p class="hint">這個物種還沒有後台補充特徵。</p>`;
}
function delNote(i){ overrides.species_notes[curSpKey].splice(i,1); if(!overrides.species_notes[curSpKey].length) delete overrides.species_notes[curSpKey]; updateDirty(true); renderNotes(); buildSpeciesSelect(); }
$("addNoteBtn").onclick = ()=>{
  const t = $("noteInput").value.trim(); if(!t||!curSpKey) return;
  (overrides.species_notes[curSpKey] = overrides.species_notes[curSpKey]||[]).push(t);
  $("noteInput").value=""; updateDirty(true); renderNotes(); buildSpeciesSelect();
};

// ── 發布 ──
function updateDirty(d){
  dirty = d;
  const nr = Object.keys(overrides.records).length, nn = Object.values(overrides.species_notes).reduce((s,a)=>s+a.length,0);
  $("pubCount").textContent = `修正 ${nr} 筆 · 補充特徵 ${nn} 條`;
  $("dirtyDot").textContent = dirty ? "● 有未發布的修改" : "✓ 已同步";
  $("publishBtn").disabled = !dirty;
}
$("publishBtn").onclick = async ()=>{
  $("publishBtn").disabled = true; $("dirtyDot").textContent = "發布中…";
  try {
    await db.doc(cfg.docPath).set({ data: JSON.stringify(overrides), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    updateDirty(false); $("dirtyDot").textContent = "✓ 已發布！網站幾秒內更新";
  } catch(e){
    $("dirtyDot").textContent = "❌ 發布失敗：" + e.message; $("publishBtn").disabled = false;
  }
};

// tabs
document.querySelectorAll(".tab").forEach(t=> t.onclick = ()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  $("tab-fix").hidden = t.dataset.tab!=="fix"; $("tab-notes").hidden = t.dataset.tab!=="notes";
});
$("loginBtn").onclick = ()=>{ const p=$("pwInput").value; if(p) login(p); };
$("pwInput").addEventListener("keydown", e=>{ if(e.key==="Enter"){ const p=$("pwInput").value; if(p) login(p); }});
$("logoutBtn").onclick = (e)=>{ e.preventDefault(); auth.signOut(); };

boot();
</script>
</body>
</html>
