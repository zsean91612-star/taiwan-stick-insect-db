w.facebook.com/groups/506259886194307/posts/2856073954546210", "author": "鍾秉霖", "timestamp": "2024-10-15", "text": "請問一下，這是哪一種竹節蟲？在海拔2400m左右遇到！謝謝！", "images": ["2856073954546210/90e4c6d3cf109772.jpg"], "species": "皮竹節蟲屬", "location": "海拔約2400公尺"}, {"post_id": "2808623045957968", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2808623045957968", "author": "陳奕翔", "timestamp": "2024-09-04", "text": "台中 霧峰\n請問是哪種竹節蟲？謝謝", "images": ["2808623045957968/9e68e3d154ac0f42.jpg", "2808623045957968/3027ad058fa01858.jpg", "2808623045957968/8565f1b8cfaafe77.jpg"], "species": "長肛竹節蟲", "location": "台中市霧峰區"}, {"post_id": "2800527800100826", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2800527800100826", "author": "Tony Yang", "timestamp": "2024-08-26", "text": "2024.08\n擬瓦腹華竹節蟲雌成蟲\n觀察於新北三峽海拔約900m山區\n之前也曾在此棲地觀察過擬瓦腹華雄成蟲\n這次終於親眼看見心心念念的雌成蟲\n拿起來聞一聞香茅味，神清氣爽XD\n與楚南氏小異竹節蟲、截角華竹節蟲、不知名皮䗛屬\n一同生活在佈滿各種殼斗科的森林裡", "images": ["2800527800100826/a58cbbeca2d2e4fe.jpg", "2800527800100826/a7a38113e064c42b.jpg", "2800527800100826/6fa8c516b6c1bec2.jpg", "2800527800100826/5af116fb83d60611.jpg"], "species": "擬瓦腹華竹節蟲", "location": "新北市三峽區海拔約900公尺山區"}, {"post_id": "2781759901977616", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2781759901977616", "author": "呂清", "timestamp": "2024-08-06", "text": "8/2攝於台中山區，海拔約2100公尺\n由照片中的比例尺可知體長不到8公分\n現場沒注意，回來看照片判斷應該是成蟲\n翻閱《台灣的竹節蟲》後，由像銅環的尾毛這個特徵猜測可能是楚南式小異竹節蟲，但分佈海拔遠高於書中所述的1200公尺，所以來社團請教各位前輩這隻是否為楚南式小異竹節蟲", "images": ["2781759901977616/dd282cf63449f293.jpg", "2781759901977616/96a66971f2453f3f.jpg"], "species": "楚南氏小異竹節蟲", "location": "台中山區，海拔約2100公尺"}, {"post_id": "2774838686003071", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2774838686003071", "author": "曾粲然", "timestamp": "2024-07-29", "text": "請教竹節蟲？\n竹子湖2024.7.21", "images": ["2774838686003071/5b78afe7dbdfbd3b.jpg", "2774838686003071/f05317bcfd8d18d9.jpg"], "species": "皮䗛屬", "location": "竹子湖"}, {"post_id": "2768649743288632", "post_url": "ht \n若同好可判別類型，也請不吝賜教～\n時間：20220604\n發現地：貴子坑小坪頂步道\n觀察備註：體長目測12公分左右，觸角短，體表摸起來有顆粒感\n猜測是顆粒短肛竹節蟲￼？！", "images": ["2185137081639904/00e0f9953fc3bba4.jpg", "2185137081639904/5db4fc1e2c0b5c40.jpg", "2185137081639904/7dc573b121f376fb.jpg"], "species": "顆粒短肛竹節蟲", "location": "貴子坑小坪頂步道"}, {"post_id": "2184454385041507", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2184454385041507", "author": "Lesley Lin", "timestamp": "2022-06-03", "text": "分享野外觀察．竹節蟲》\n若同好可判別類型，也請不吝賜教～\n時間：20220603\n發現地：面天山步道（海拔約500公尺）\n觀察備註：全綠，無明顯尾毛，觸角長於前足腿節", "images": ["2184454385041507/8b9d4d9c348e2146.jpg", "2184454385041507/2a7d2a40eeb50af1.jpg", "2184454385041507/63bdb0b4a0d761b0.jpg", "2184454385041507/50b79fdbebbd777a.jpg"], "species": "皮竹節蟲", "location": "面天山步道 海拔約500m"}, {"post_id": "2181397582013854", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2181397582013854", "author": "鄭琨寶", "timestamp": "2022-05-30", "text": "夜間拍攝照片有點糊請見諒\n想問這位是誰\n2022.05.27高雄旗山旗尾山", "images": ["2181397582013854/9a3e4422fe3b212a.jpg"], "species": "長肛竹節蟲", "location": "高雄旗山旗尾山"}, {"post_id": "2179608852192727", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2179608852192727", "author": "Lesley Lin", "timestamp": "2022-05-28", "text": "分享野外觀察．竹節蟲》\n若同好可判別類型，也請不吝賜教～\n時間：20220528 \n發現地：基隆白米甕尖\n觀察備註：全綠，尾部分岔，在青苧麻上發現", "images": ["2179608852192727/22c51bda9098f1c1.jpg", "2179608852192727/8eaf1d34928fd1da.jpg", "2179608852192727/b2df3958e8562414.jpg"], "species": "棉桿竹節蟲", "location": "基隆白米甕尖"}, {"post_id": "2179606238859655", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2179606238859655", "author": "Lesley Lin", "timestamp": "2022-05-28", "text": "分享野外觀察．竹節蟲》\n若同好可判別類型，也請不吝賜教～\n時間：20220528 \n發現地：基隆白米甕尖\n觀察備註：尾部有黑黑一小條", "images": ["2179606238859655/e72d94fb326785a6.jpg", "2179606238859655/abd3b9ca0d179593.jpg"], "species": "皮竹節蟲", "location": "基隆白米甕尖"}, {"post_id": "2170624199757859", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2170624199757859", "author": "黃常進", "timestamp": "2022-05-17", "text": "請問這是什麼品種的竹節蟲？一隻在南投山區，氣溫20度左右；另一隻在台南平地，在樟樹葉上發現的，氣溫約25度左右。感恩！", "images": ["2170624199757859/35986e71b4b19e3c.jpg", "2170624199757859/59c65a04b6a10458.jpg"], "species": "短肛竹節蟲", "location": "南投山區；台南平地"}, {"post_id": "2170022953151317", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2170022953151317", "author": "Lesley Lin", "timestamp": "2022-05-16", "text": "續分享：去年在瑞芳龍潭山先後發現的兩隻竹節蟲", "images": ["2170022953151317/d6f5b5a92d2d7e59.jpg", "2170022953151317/d4e7a7db383678a3.jpg", "2170022953151317/08c4776bb2d60b83.jpg", "2170022953151317/4f20c4372cca4436.jpg"], "species": "皮竹節蟲", "location": "瑞芳龍潭山"}, {"post_id": "2169981266488819", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2169981266488819", "author": "Lesley Lin", "timestamp": "2022-05-16", "text": "分享：20210530瑞芳龍潭山發現的竹節蟲", "images": ["2169981266488819/9ed626f4476c2eb0.jpg", "2169981266488819/e7abcc5d48a595e5.jpg"], "species": "皮竹節蟲", "location": "瑞芳龍潭山"}, {"post_id": "2155186234634989", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2155186234634989", "author": "鄭琨寶", "timestamp": "2022-04-28", "text": "請問是棉桿嗎\n從門縫中拯救出來\n可惜斷了一隻腳\n2022.04.28高雄旗山鼓山公園", "images": ["2155186234634989/09afcc9458b67dcf.jpg", "2155186234634989/57a5737a82aa8047.jpg"], "species": "棉桿竹節蟲", "location": "高雄旗山鼓山公園"}, {"post_id": "2152275818259364", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2152275818259364", "author": "獨特小楓", "timestamp": "2022-04-25", "text": "2022.4.24三峽", "images": ["2152275818259364/4e5eb31560c021d6.jpg"], "species": "瘤竹節蟲", "location": "三峽"}, {"post_id": "2152088568278089", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2152088568278089", "author": "Natacha Yee", "timestamp": "2022-04-24", "text": "(更新) 五月蛻皮完後，公蟲的橘色線條變得更加明顯，因此又多照了幾張。採集時共有兩隻，蛻皮幾次後，發現剛好一公一母，顏色與體型差異也大很有趣，也附上雌蟲的照片。\n//\n請教蟲友這是雙色皮竹節蟲嗎？(身體兩側有黑線，身體上沒有什麼顆粒)\n他的觸角比前腳還長，另外屁股也會翹起來，發現地點為新竹尖石鄉山區，海拔約900m，附上當時的食草照片(鵝掌柴？) 估狗跟翻書很久了只覺得辨識好難，很想知道他的身世......", "images": ["2152088568278089/a7bb850cafc56c29.jpg", "2152088568278089/59bf1f29502153d3.jpg", "2152088568278089/2a38bd51547f4838.jpg", "2152088568278089/4ccced4857e656a4.jpg", "2152088568278089/8bc0ab94ecc27bc8.jpg"], "species": "皮竹節蟲", "location": "新竹尖石鄉山區（海拔約900公尺）"}, {"post_id": "2139179572902322", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2139179572902322", "author": "張書銘", "timestamp": "2022-04-07", "text": "2022.04.06 蘭嶼\n大國氏細頸竹節蟲 若蟲\nSipyloidea  okunii\n這種蟲非常美，但設備不好，歡迎跟貼其他照片!", "images": ["2139179572902322/f66de86637f0ff9f.jpg"], "species": "大國氏細頸竹節蟲", "location": "蘭嶼"}, {"post_id": "2136789473141332", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2136789473141332", "author": "Amy Tan", "timestamp": "2022-04-04", "text": "各位前輩們好，近日我在瑪家夜觀時拍攝到此二種竹節蟲，但卻無法辨識他們是哪種，想請教各位前輩他們的品種！\n謝謝各位", "images": ["2136789473141332/548c30c405e7d88d.jpg", "2136789473141332/d828209289867dc2.jpg"], "species": "長肛竹節蟲", "location": "屏東縣瑪家"}, {"post_id": "2129092863910993", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2129092863910993", "author": "Jennifer Chuang", "timestamp": "2022-03-25", "text": "請問前輩\n在戶外看到一隻竹節蟲\n前端有一顆顆的卵狀物\n那是牠自己的\n還是被寄生的？\n謝謝解惑！", "images": ["2129092863910993/7779fafb53048b2a.jpg", "2129092863910993/9cbd2c80b04bb5c3.jpg"], "species": "", "location": ""}, {"post_id": "2126162884203991", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2126162884203991", "author": "張家銘", "timestamp": "2022-03-21", "text": "請問這隻是棉桿嗎?\n屏東2022.3.20", "images": ["2126162884203991/17c72b061e47429a.jpg"], "species": "棉桿竹節蟲", "location": "屏東"}, {"post_id": "2123287417824871", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2123287417824871", "author": "Bonnie Leong", "timestamp": "2022-03-17", "text": "路上看到幾隻這小小隻的竹節蟲，好奇是哪種？\n天母—2022.3.16", "images": ["2123287417824871/26382009f3709046.jpg"], "species": "日本棘竹節蟲", "location": "台北市天母 "}, {"post_id": "2004634519690162", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2004634519690162", "author": "張書銘", "timestamp": "2021-10-11", "text": "2021.10.10 員林 藤山步道\n顆粒短肛竹節蟲 Ramulus granulatus", "images": ["2004634519690162/600d1ed316cf5ac9.jpg"], "species": "顆粒短肛竹節蟲", "location": "彰化縣員林市藤山步道"}, {"post_id": "2004311773055770", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2004311773055770", "author": "賴鵬智", "timestamp": "2021-10-10", "text": "少一隻腳的竹節蟲。\n羅桂枝/20210930攝於阿里山國家森林遊樂區，海拔2170公尺處。\n請問中文及學名 ？謝謝。", "images": ["2004311773055770/fc9653e1517ed124.jpg"], "species": "長肛竹節蟲", "location": "阿里山國家森林遊樂區"}, {"post_id": "2001692206651060", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2001692206651060", "author": "蕭世祥", "timestamp": "2021-10-07", "text": "20200709拔刀爾山\n求名?", "images": ["2001692206651060/e4118225014d4930.jpg"], "species": "皮竹節蟲", "location": "拔刀爾山"}, {"post_id": "1999913633495584", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1999913633495584", "author": "呂清", "timestamp": "2021-10-04", "text": "前陣子有天睡覺忘記關燈，半夜醒來看到房門外開趴了，頭燈照射範圍外還有三隻\n大雪山，海拔約2200，半夜不好拍照僅此一張，不知道是什麼竹節蟲", "images": ["1999913633495584/08bbc27b35d10017.jpg"], "species": "", "location": "大雪山"}, {"post_id": "1999193990234215", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1999193990234215", "author": "林啟淵", "timestamp": "2021-10-03", "text": "2021.9.9  高雄旗山中寮山\n真的是長肛竹節蟲 雌蟲？", "images": ["1999193990234215/78fe08bc220b7a32.jpg"], "species": "長肛竹節蟲", "location": "高雄旗山中寮山"}, {"post_id": "1999166486903632", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1999166486903632", "author": "張書銘", "timestamp": "2021-10-03", "text": "2021.08.12 天母古道\n日本棘竹節蟲 Neohirasea japonica", "images": ["1999166486903632/def1cd17804ddbcc.jpg"], "species": "日本棘竹節蟲", "location": "天母古道"}, {"post_id": "1985727511580863", "post_url": "https://www.facebook.com/groups/506259886194307/posts/198572751158 竹節蟲」身上難道完全都沒有小顆粒嗎?還是有但較不明顯?因為書、網路上的照片感覺都不是那麼清楚，希望各位如果有比較清晰的照片可以借我學習一下，謝謝~", "images": ["1876405812513034/412584e29a9c5a00.jpg", "1876405812513034/a305738ef6465e1e.jpg", "1876405812513034/6bec9c45c97f4f8f.jpg", "1876405812513034/8fb2e9aae1cf9305.jpg", "1876405812513034/362a3379343fa328.jpg"], "species": "粗粒皮竹節蟲", "location": "宜蘭縣三星鄉龍泉步道"}, {"post_id": "1866106996876249", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1866106996876249", "author": "孫崇華", "timestamp": "2021-04-25", "text": "想請問種類?  感謝\n採集海拔約1200m", "images": ["1866106996876249/47fc06cafadb1e84.jpg", "1866106996876249/8f743941ded8f56e.jpg"], "species": "竹節蟲", "location": "海拔1200m"}, {"post_id": "1865814780238804", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1865814780238804", "author": "陳立", "timestamp": "2021-04-25", "text": "請教這種名字?與其食草(下面)\n感謝— 在內洞林道。", "images": ["1865814780238804/12b3f674f254fc46.jpg"], "species": "皮竹節蟲", "location": "內洞林道"}, {"post_id": "1828662077287408", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1828662077287408", "author": "陳升", "timestamp": "2021-03-07", "text": "請問是何種竹節蟲??20210305烏來瀑布公園", "images": ["1828662077287408/3035bf48e6c9f288.jpg"], "species": "素木氏瘤竹節蟲", "location": "新北市烏來區烏來瀑布公園"}, {"post_id": "1804847393002210", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1804847393002210", "author": "吳威漢", "timestamp": "2021-02-02", "text": "打擾各位...對竹節蟲不太熟\n特來請教蟲名。謝謝\n2021.01.22 台北市文山運動中心旁", "images": ["1804847393002210/cd8510c808782275.jpg"], "species": "長肛竹節蟲", "location": "台北市文山區"}, {"post_id": "1791952560958360", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1791952560958360", "author": "蕭世祥", "timestamp": "2021-01-17", "text": "請問竹節蟲種類\n20200819 天母", "images": ["1791952560958360/257c6a280a0ce4d6.jpg"], "species": "長肛竹節蟲", "location": "台北市士林區天母"}, {"post_id": "1776928199127463", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1776928199127463", "auth 他配合著風移動使他更像樹枝，這一切實在太奇妙了，我打從心中佩服起他的偽裝技巧，同時我也在他身上學到一些人生的道理，蠻感謝他的，至於是什麼道理就留給各位自己想想吧，也歡迎大家分享想法\n今天的介紹就到這邊，謝謝大家耐心看完，如果喜歡我的文章歡迎分享按讚讓更多人看見，下一則跟蛇蛇有關喔，請怕蛇的人做好心理準備\n#蘭嶼筒胸竹節蟲  #台灣最大的竹節蟲   #蘭嶼   #貝殼蛋", "images": ["1056796531140637/6c552e6b45313312.jpg", "1056796531140637/4fa8bdfa15b4d237.jpg", "1056796531140637/ecdd199f9820ee33.jpg", "1056796531140637/e3026c46dbefb066.jpg", "1056796531140637/9632cebd79c5b5b8.jpg"], "species": "蘭嶼筒胸竹節蟲", "location": "蘭嶼"}, {"post_id": "1020562738097350", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1020562738097350", "author": "葉宗哲", "timestamp": "2018-06-28", "text": "葉宗哲的貼文", "images": ["1020562738097350/374d9ecb02404509.jpg"], "species": "", "location": "台北市大安區富陽生態公園"}, {"post_id": "1017350948418529", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1017350948418529", "author": "陳升", "timestamp": "2018-06-24", "text": "請問是何種竹節蟲??20180624石碇的雲海國小", "images": ["1017350948418529/36538fcd99cdefe1.jpg"], "species": "粗粒皮竹節蟲", "location": "新北市石碇雲海國小"}, {"post_id": "1010006499152974", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1010006499152974", "author": "許哲彰", "timestamp": "2018-06-17", "text": "20180616嘉義縣竹崎鄉光華\n牛山步道\n雲霧帶吃咬人貓的竹節蟲,大約在3平方公尺的咬人貓上發現8隻竹節蟲,有褐色及綠色兩種色型.\n剛剛才看到版主傳授的辨識重點 不曉得有限的圖片能不能看出種類?請教大家這是?", "images": ["1010006499152974/1559697bdb19e772.jpg"], "species": "皮竹節蟲", "location": "嘉義縣竹崎鄉牛山步道"}, {"post_id": "998526436967647", "post_url": "https://www.facebook.com/groups/506259886194307/posts/998526436967647", "author": "吳晏宇", "timestamp": "2018-06-01", "text": "請問可以幫鑑定品種嗎～ 謝謝", "images": ["998526436967647/75ad14ef55fec549.jpg", "998526436967647/642497e44d69e37f.jpg"], "species": "長肛竹節蟲", "location": "宜蘭五峰"}, {"post_id": "994841994002758", "post_url": "https://www.facebook.com/groups/506259886194307/posts/994841994002758", "author": "洪睿臨", "timestamp": "2018-05-25", "text": "野外觀察分享：皮竹節蟲\n如果是在野外想要找到竹節蟲，環境不外乎兩個要素，水與食草，尤其皮竹節蟲這類有群聚發生的情形，會更容易觀察\n這次觀察的主角食草為長葉苧麻，這種植物需要高濕的環境，又是在樹林底層，其實皮竹節蟲也不太害羞，基本上他們有些是會大剌剌的停在葉面上的，有些雄蟲已經成熟（圖二可以清楚看見身上的縱紋，有別於若蟲的整隻綠色），雌蟲則大部分目擊到都還是若蟲（圖三、圖四），這次共目擊4雄3雌，圖五圖六則是生長環境，在蕨類與長葉苧麻底下，是一個極淺的流動水域。這是我第一次目擊到這麼多竹節蟲，過程中也有經過協助，分享給各位同好", "images": ["994841994002758/d0a79e4ffaffa064.jpg", "994841994002758/d49aa768fb670be2.jpg", "994841994002758/7e797cacd8a8449f.jpg", "994841994002758/6091a2e2ea5c6b6d.jpg", "994841994002758/5dc6b7f538a13d35.jpg"], "species": "皮竹節蟲", "location": ""}, {"post_id": "991025741051050", "post_url": "https://www.facebook.com/groups/506259886194307/posts/991025741051050", "author": "林柏昌", "timestamp": "2018-05-19", "text": "請教竹節蟲之鑑定\n20180518三峽熊空，海拔約300M", "images": ["991025741051050/d5acd03d3454cd84.jpg", "991025741051050/daf864d68c564042.jpg", "991025741051050/e1688dd1ce7a10ef.jpg"], "species": "長肛竹節蟲", "location": "新北市三峽區熊空"}, {"post_id": "991024724384485", "post_url": "https://www.facebook.com/groups/506259886194307/posts/991024724384485", "author": "林柏昌", "timestamp": "2018-05-19", "text": "請教竹節蟲之鑑定\n寄主植物：台灣山香圓\n20180518三峽熊空，海拔約300M", "images": ["991024724384485/e1c2dbcfc0e9a1a3.jpg", "991024724384485/0cbaba37be1ba900.jpg", "991024724384485/9ad117b2e668c40e.jpg"], "species": "皮竹節蟲", "location": "新北市三峽區熊空"}, {"post_id": "975862849234006", "post_url": "https://www.facebook.com/groups/506259886194307/posts/975862849234006", "author": "葉宗哲", "timestamp": "2018-04-20", "text": "象山步道2018/4/19/星期四，請教種類", "images": ["975862849234006/d6ef0de1adadabeb.jpg", "975862849234006/4fe86991d1f5b6d6.jpg"], "species": "台北長肛竹節蟲", "location": "台北市信義區象山步道"}, {"post_id": "961621390658152", "post_url": "https://www.facebook.com/groups/506259886194307/posts/961621390658152", "author": "Bertha Chu", "timestamp": "2018-03-24", "text": "地點內湖五指山，想請問大大們\n牠是什麼竹節蟲?\n#內湖五指山20180324", "images": ["961621390658152/0214d4ee6a80691c.jpg"], "species": "長肛竹節蟲", "location": "台北市內湖區五指山"}, {"post_id": "959942554159369", "post_url": "https://www.facebook.com/groups/506259886194307/posts/959942554159369", "author": "洪睿臨", "timestamp": "2018-03-21", "text": " 323116575", "author": "林彧綦", "timestamp": "", "text": "今天再次回到之前找到長肛的同一地點，希望能再帶幾隻雌蟲回去，解決雌雄比例懸殊的問題，結果雌蟲沒找到，反倒是找到了之前沒見過的物種...\n從其觸角明顯較長這點來看，應該是屬於長角棒䗛科皮䗛屬，但不確定具體是哪一個物種。比較明顯的特徵有全身呈深褐色，以及觸角末兩節呈白色\n前四張照片是一齡蟲、第五張是應該是同種的二齡蟲\n採集地：新北市瑞芳區金瓜石", "images": ["2670370323116575/866ab4dded8b5407.jpg", "2670370323116575/cb30b39d3c1257e3.jpg", "2670370323116575/84621c7f99461109.jpg", "2670370323116575/6ba90b0bd7e96096.jpg", "2670370323116575/9a2b6fbfbb65c8b4.jpg"], "species": "皮䗛屬未定種", "location": "新北市瑞芳區金瓜石"}, {"post_id": "2655248467962094", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2655248467962094", "author": "鍾秉霖", "timestamp": "", "text": "純粹分享：杉林遇到的竹節蟲，我大概30年沒在野外遇到，已放回大自然！", "images": ["2655248467962094/6e0165394097e9e2.jpg", "2655248467962094/d93e5af3b50dfd41.jpg"], "species": "竹節蟲（未定種）", "location": "杉林"}, {"post_id": "2614516458701962", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2614516458701962", "author": "陳語霖", "timestamp": "", "text": "想請教各位竹節蟲達人\n這是我在水漾森林山徑上遇見的竹節蟲寶寶海拔約2000初\n請問是否為棉桿三齡若蟲（公）呢？", "images": ["2614516458701962/067f950a249c8296.jpg", "2614516458701962/7b4ed64f5f89ac57.jpg"], "species": "竹節蟲", "location": "水漾森林山徑，海拔約2000公尺初"}, {"post_id": "2566457716841170", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2566457716841170", "author": "孫國鈞", "timestamp": "", "text": "#短肛竹節蟲\n翠山步道 2023/10/5", "images": ["2566457716841170/791b29390bc957bc.jpg", "2566457716841170/9bafcc0a076f9a54.jpg"], "species": "短肛竹節蟲", "location": "翠山步道"}, {"post_id": "2513062905513985", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2513062905513985", "author": "孫國鈞", "timestamp": "", "text": "#皮竹節蟲？？？\n2023/7/19菜公坑山", "images": ["2513062905513985/e312b86826248bfc.jpg", "2513062905513985/696d30a64a05af34.jpg"], "species": "", "location": "菜公坑山"}, {"post_id": "2510320935788182", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2510320935788182", "author": "Tony Yang", "timestamp": "", "text": ok.com/groups/506259886194307/posts/1961404684013146", "author": "張書銘", "timestamp": "", "text": "2021.08.12 天母古道\n日本棘竹節蟲 Neohirasea japonica \n北部的竹節蟲其實都離大台北生活圈不遠，花點時間學習經驗並探索，真的不難找，鼓勵大家可以多貼一些照片上來給大家辨識\nPhoto by 郭子信", "images": ["1961404684013146/1754e4b5eafccc9e.jpg"], "species": "日本棘竹節蟲", "location": "天母古道"}, {"post_id": "2474678876019055", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2474678876019055", "author": "湯興漢", "timestamp": "", "text": "很低調低調到快跟背景融在一起的日本棘竹節蟲....", "images": ["2474678876019055/0021e8dd5c82f170.jpg"], "species": "日本棘竹節蟲", "location": ""}, {"post_id": "2001690309984583", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2001690309984583", "author": "蕭世祥", "timestamp": "", "text": "20211006天母古道\n素木氏瘤竹節蟲Orestes shirakii", "images": ["2001690309984583/838cc0284467127d.jpg"], "species": "素木氏瘤竹節蟲", "location": "天母古道"}, {"post_id": "2203734736446805", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2203734736446805", "author": "黃榆翔", "timestamp": "", "text": "擬瓦腹華竹節蟲", "images": ["2203734736446805/3aa41d0fa3f2d82f.jpg"], "species": "擬瓦腹華竹節蟲", "location": ""}, {"post_id": "509186622568300", "post_url": "https://www.facebook.com/groups/506259886194307/posts/509186622568300", "author": "廖文泉", "timestamp": "", "text": "2015/08/01扇平生態園區\n待查的竹節蟲??-----2\n尾部", "images": ["509186622568300/362042897c068d79.jpg"], "species": "角臀䗛", "location": "扇平生態園區"}, {"post_id": "509174995902796", "post_url": "https://www.facebook.com/groups/506259886194307/posts/509174995902796", "author": "廖文泉", "timestamp": "", "text": "2015/08/01扇平生態園區\n待查的竹節蟲??\n頭、胸、前肢和觸角", "images": ["509174995902796/b0f8ea280e2855d8.jpg"], "species": "", "location": "扇平生態園區"}, {"post_id": "2137352896418323", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2137352896418323", "author": "張書銘", "timestamp": "", "text": "2022.04.05 蘭嶼\nPhasmotaenia lanyuhensis \n蘭嶼筒胸竹節蟲\n大部分的野生的若蟲個體都是綠色或淺棕色，這隻顏色非常深，紀錄一下，不知道有沒有人拍過體色相近的成蟲個體\n發現會 // ─────────────────────────────────────────────────────────────────────────────

let activeFilters = { species: "", location: "" };
let searchQuery = "";

// 去除尾部的性別標註，取得物種基本名
function speciesBase(sp) {
  return sp ? sp.replace(/（[雌雄]+）$/, "").trim() : "";
}

function buildFilterLists() {
  // 物種以 baseName 分組計數
  const speciesCounts = {};
  const locationCounts = {};
  POSTS.forEach(p => {
    if (p.species) {
      const base = speciesBase(p.species);
      speciesCounts[base] = (speciesCounts[base] || 0) + 1;
    }
    if (p.location) locationCounts[p.location] = (locationCounts[p.location] || 0) + 1;
  });

  const sList = document.getElementById("species-list");
  document.getElementById("species-all-count").textContent = POSTS.length;
  Object.entries(speciesCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("species", name, li);
      sList.appendChild(li);
    });

  const lList = document.getElementById("location-list");
  document.getElementById("location-all-count").textContent = POSTS.length;
  Object.entries(locationCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("location", name, li);
      lList.appendChild(li);
    });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const list = type === "species"
    ? document.getElementById("species-list")
    : document.getElementById("location-list");
  list.querySelectorAll("li").forEach(li => li.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return POSTS.filter(p => {
    if (activeFilters.species && speciesBase(p.species) !== activeFilters.species) return false;
    if (activeFilters.location && p.location !== activeFilters.location) return false;
    if (q) {
      const haystack = [p.species, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("total-badge").textContent = `${posts.length} 筆`;

  if (posts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => {
    const imgHtml = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" loading="lazy" alt="">`
      : `<div class="card-no-img">🦗</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    return `
      <div class="card" onclick="openModal(${POSTS.indexOf(p)})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-species">${p.species || "（物種未知）"}${p._corrected ? '<span class="corrected-badge">已修訂</span>' : ''}</div>
          ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
          <div class="card-text">${p.text || ""}</div>
          <div class="card-meta">
            <span>${p.author || ""}</span>
            <span>${ts}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";

  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

// 後台修訂：優先讀 Firestore（即時），失敗才用靜態 overrides.json。
async function fetchOverrides() {
  try {
    const cfg = await (await fetch("backend.json?_=" + Date.now())).json();
    if (cfg && cfg.projectId && cfg.apiKey) {
      const url = `https://firestore.googleapis.com/v1/projects/${cfg.projectId}/databases/(default)/documents/${cfg.docPath}?key=${cfg.apiKey}`;
      const r = await fetch(url);
      if (r.ok) {
        const j = await r.json();
        const s = j.fields && j.fields.data && j.fields.data.stringValue;
        return s ? JSON.parse(s) : { records: {}, species_notes: {} };
      }
      if (r.status === 404) return { records: {}, species_notes: {} };
    }
  } catch (e) { /* 後端未設定或失敗 → fallback */ }
  try { const r = await fetch("overrides.json?_=" + Date.now()); if (r.ok) return await r.json(); } catch (e) {}
  return { records: {}, species_notes: {} };
}
async function loadOverrides() {
  const ov = await fetchOverrides();
  const recs = (ov && ov.records) || {};
  for (const p of POSTS) {
    const o = recs[p.post_id];
    if (!o) continue;
    if (o.species) p.species = o.species;
    if (o.scientific !== undefined && o.scientific !== null) p.scientific = o.scientific;
    p._corrected = true;
  }
}
(async () => {
  await loadOverrides();
  buildFilterLists();
  renderGrid();
})();
</script>
