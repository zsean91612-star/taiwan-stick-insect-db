  /* ── Header ── */

    font-size: .72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

    color: var(--muted);
    display: none;
  }

  #modal-link {

    color: var(--accent);
    text-decoration: none;
  }
  #modal-link:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    aside { display: none; }

</style>

替相對較慢的昆蟲來說，我建議住附近的人可以到發現地點持續做觀察，多發現幾筆紀錄當證據，比較不會被當成逃逸無法形成族群的零星個案。（光是拍到一隻成蟲很難當成野外已經有族群的證據）\n\n3.不要急著號召大家去移除，因為不是所有人都會辨識或鑑定，怕有人會誤移除當地原生種\n\n本人最近比較少拍竹節蟲的照片，拿舊圖來放一下", "images": ["f366d104fa2ccaa5.jpg"], "species": "", "location": "野外"}, {"post_id": "2897448980408707", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2897448980408707", "author": "徐志文", "timestamp": "", "text": "請問?\n猜是素木氏瘤竹節蟲\n1131119新竹內灣", "images": ["d278e820af85f717.jpg"], "species": "素木氏瘤竹節蟲", "location": "新竹"}, {"post_id": "2877254562428149", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2877254562428149", "author": "廖子為", "timestamp": "", "text": "屏東2024.10.26\n請教種類", "images": ["6b63b1be91fe4f04.jpg"], "species": "長肛竹節蟲", "location": "屏東"}, {"post_id": "2856073954546210", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2856073954546210", "author": "鍾秉霖", "timestamp": "", "text": "請問一下，這是哪一種竹節蟲？在海拔2400m左右遇到！謝謝！", "images": ["73e4edabc39b520e.jpg"], "species": "皮竹節蟲", "location": "海拔"}, {"post_id": "2800527800100826", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2800527800100826", "author": "Tony Yang", "timestamp": "", "text": "2024.08擬瓦腹華竹節蟲雌成蟲觀察於新北三峽海拔約900m山區之前也曾在此棲地觀察過擬瓦腹華雄成蟲…… 查看更多", "images": ["49b7b38b2535eacd.jpg", "9944f4cd1260312d.jpg", "c67ba2842e0cb6f1.jpg", "49c22a118f9935c2.jpg"], "species": "擬瓦腹華竹節蟲", "location": "海拔"}, {"post_id": "2792696524217287", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2792696524217287", "author": "孫國鈞", "timestamp": "", "text": "#台灣長肛竹節蟲？？？大屯自然公園 2024/8/18", "images": ["5487c194cbb41418.jpg", "23f0472779ba18b0.jpg", "9cfeba16a24bd20b.jpg"], "species": "台灣長肛竹節蟲", "location": "自然公園"}, {"post_id": "2781759901977616", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2781759901977616", "author": "呂清", "timestamp": "", "text": "8/2攝於台中山區，海拔約2100公尺由照片中的比例尺可知體長不到8公分現場沒注意，回來看照片判斷應該是成蟲翻閱《台灣的竹節蟲》後，由像銅環的尾毛這個特徵猜測可能是楚南式小異竹節蟲，但分佈海拔遠高於書中所述的1200公尺，所以來社團請教各位前輩這隻是否為楚南式小異竹節蟲", "images": ["1a5bf6b2234bf99b.jpg", "d28f2b180da33ef0.jpg"], "species": "小異竹節蟲", "location": "海拔"}, {"post_id": "2768649743288632", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2768649743288632", "author": "韓羲之", "timestamp": "", "text": "請教竹節蟲, 謝謝林彧綦網大:\n#長肛竹節蟲屬(Entoria).\n24.7.台東.", "images": ["72f38397d7cfc35f.jpg"], "species": "長肛竹節蟲", "location": "台東"}, {"post_id": "2764327823720824", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2764327823720824", "author": "簡廷仰", "timestamp": "", "text": "2023.6 桃園復興 海拔約1900\n請教可能的種類？感謝回覆", "images": ["ad2ca982a1f16457.jpg"], "species": "", "location": "海拔"}, {"post_id": "2763185293835077", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2763185293835077", "author": "孫國鈞", "timestamp": "", "text": "#日本棘竹節蟲？？？2024/7/14 二子坪步道", "images": ["b08979ada5385f8c.jpg", "c71cbb86f4a6150f.jpg", "34a71bf8fe165c9c.jpg"], "species": "日本棘竹節蟲", "location": "步道"}, {"post_id": "2763186660501607", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2763186660501607", "author": "孫國鈞", "timestamp": "", "text": "#短肛竹節蟲？？？\n二子坪步道 2024/7/14", "images": ["dc2ee044fa0f0ba7.jpg", "2401a9bedbc17a13.jpg", "9e6ac6d1e858319f.jpg", "7977e49f616c4cb6.jpg", "6b666300b975bb89.jpg"], "species": "短肛竹節蟲", "location": "步道"}, {"post_id": "2762086447278295", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2762086447278295", "author": "廖正智", "timestamp": "", "text": "在野外該怎麽去找竹節蟲，它若不是待在不屬於擬態的環境，真的比螳螂要難找到它", "images": ["3c32e736512b2c7b.jpg"], "species": "素木瘤竹節蟲", "location": "野外"}, {"post_id": "2755016671318606", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2755016671318606", "author": "孫國鈞", "timestamp": "", "text": "謝謝指導擎天崗跟二子坪這兩張圖是長肛竹節蟲沒錯，冷水坑則是皮竹節蟲。擎天崗 冷水坑 二子坪 2024/7/4（夜拍三個地方拍的）", "images": ["70201de455a19e87.jpg", "467c4f0a144ad928.jpg", "4430f1e1b922726f.jpg"], "species": "皮竹節蟲", "location": "二子坪"}, {"post_id": "2753468754806731", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2753468754806731", "author": "曾粲然", "timestamp": "", "text": "請問是否為截角華竹節蟲Sinophasma truncating？感謝～七星山2024.7.1", "images": ["077676794f25fcee.jpg", "881b63631f6f9a04.jpg"], "species": "截角華竹節蟲", "location": "七星山"}, {"post_id": "2749071941913079", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2749071941913079", "author": "Formosa Pan", "timestamp": "", "text": "請教物種名？\n\n皮竹節蟲(雄成蟲)\n\n感謝林彧綦前輩的指導。\n\n2024/06/26于新北市新店區二趴子植物園", "images": ["48bad37eac14256a.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2748175425336064", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2748175425336064", "author": "孫國鈞", "timestamp": "", "text": "台灣長肛竹節蟲？？？\n陽明山夢幻湖戰備道 2024/6", "images": ["9e520169a6d64202.jpg", "93687517f0aa5457.jpg", "25cbc55a18caf0a9.jpg", "1c70fb80438904fc.jpg"], "species": "台灣長肛竹節蟲", "location": "陽明山"}, {"post_id": "2741721025981504", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2741721025981504", "author": "孫國鈞", "timestamp": "", "text": "#皮竹節蟲Phraortes sp. \n陽明山地區 2024/6", "images": ["b8975da92ece38ae.jpg"], "species": "皮竹節蟲", "location": "陽明山"}, {"post_id": "2739030586250548", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2739030586250548", "author": "孫國鈞", "timestamp": "", "text": "皮竹節蟲 雄成蟲（右圖局放）\n陽明山二子坪 2024/6⋯", "images": ["494b469621dc4960.jpg", "83e2001ecb3e3506.jpg"], "species": "皮竹節蟲", "location": "陽明山"}, {"post_id": "2737013973118876", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2737013973118876", "author": "湯興漢", "timestamp": "", "text": "2024.06.10，新店二叭子植物園，請問這是甚麼竹節蟲？", "images": ["514791fba7ed26a6.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2736023559884584", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2736023559884584", "author": "湯興漢", "timestamp": "", "text": "20240609，新店二叭子植物園，請問這是甚麼竹節蟲？挺大隻的，超過10cm....", "images": ["e7ba4490fdc53a29.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2683119045175036", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2683119045175036", "author": "林彧綦", "timestamp": "", "text": "關於長肛竹節蟲的幾個疑惑：1.台灣到底有幾個長肛竹節蟲屬的物種？我看台灣物種名錄裡顯示有12種，但其中有不少種在TBN與台灣生命大百科上缺乏觀測紀錄與相關資料，或是在網路上幾乎找不到任何圖片與資訊。目前資訊比較多的只有台灣、台北、銅門與恆春四個物種而已。2.長肛的雄蟲有幾個齡？我記得雄蟲的齡期通常會比雌蟲少，我自己數出來應該是6個，但我不太確定。…… 查看更多", "images": ["80c5cafb3c99b462.jpg", "a8bc93ce3b8d0bac.jpg", "f4d34e7a4dc9c9b3.jpg", "1d7f09aaee13263c.jpg"], "species": "長肛竹節蟲", "location": "台北"}, {"post_id": "2670370323116575", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2670370323116575", "author": "林彧綦", "timestamp": "", "text": "今天再次回到之前找到長肛的同一地點，希望能再帶幾隻雌蟲回去，解決雌雄比例懸殊的問題，結果雌蟲沒找到，反倒是找到了之前沒見過的物種...從其觸角明顯較長這點來看，應該是屬於長角棒䗛科皮䗛屬，但不確定具體是哪一個物種。比較明顯的特徵有全身呈深褐色，以及觸角末兩節呈白色前四張照片是一齡蟲、第五張是應該是同種的二齡蟲採集地：新北市瑞芳區金瓜石", "images": ["652539d8b0bc867f.jpg", "01002b069e5d3f17.jpg", "dd163686cbf086d1.jpg", "2321a853143b50cb.jpg", "0e91d154a445fa04.jpg"], "species": "未知（雌）", "location": "新北"}, {"post_id": "2655248467962094", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2655248467962094", "author": "鍾秉霖", "timestamp": "", "text": "純粹分享：杉林遇到的竹節蟲，我大概30年沒在野外遇到，已放回大自然！", "images": ["c5a4d678b18452ec.jpg", "e6cfa8264a8c38b9.jpg"], "species": "", "location": "野外"}, {"post_id": "2623875341099407", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2623875341099407", "author": "林彧綦", "timestamp": "", "text": "想請問這是長肛還是短肛的若蟲呢？第三張圖是幾週前蛻皮完的樣子採集地：新北市瑞芳區金瓜石", "images": ["a9e32f354a76f571.jpg", "882820070ed6321b.jpg", "5de459d42d26b014.jpg"], "species": "", "location": "新北"}, {"post_id": "2614516458701962", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2614516458701962", "author": "陳語霖  · 追蹤", "timestamp": "", "text": "想請教各位竹節蟲達人這是我在水漾森林山徑上遇見的竹節蟲寶寶海拔約2000初…… 查看更多", "images": ["daed159a0e825866.jpg", "9651f7caec3ed3fe.jpg"], "species": "", "location": "森林"}, {"post_id": "2610418955778379", " // ─────────────────────────────────────────────────────────────────────────────

let activeFilters = { species: "", location: "" };
let searchQuery = "";

// 去除尾部的性別標註，取得物種基本名
function speciesBase(sp) {
  return sp ? sp.replace(/（[雌雄]+）$/, "").trim() : "";
}

function buildFilterLists() {
  // 物種以 baseName 分組計數
  const speciesCounts = {};
  const locationCounts = {};
  POSTS.forEach(p => {
    if (p.species) {
      const base = speciesBase(p.species);
      speciesCounts[base] = (speciesCounts[base] || 0) + 1;
    }
    if (p.location) locationCounts[p.location] = (locationCounts[p.location] || 0) + 1;
  });

  const sList = document.getElementById("species-list");
  document.getElementById("species-all-count").textContent = POSTS.length;
  Object.entries(speciesCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("species", name, li);
      sList.appendChild(li);
    });

  const lList = document.getElementById("location-list");
  document.getElementById("location-all-count").textContent = POSTS.length;
  Object.entries(locationCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("location", name, li);
      lList.appendChild(li);
    });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const list = type === "species"
    ? document.getElementById("species-list")
    : document.getElementById("location-list");
  list.querySelectorAll("li").forEach(li => li.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return POSTS.filter(p => {
    if (activeFilters.species && speciesBase(p.species) !== activeFilters.species) return false;
    if (activeFilters.location && p.location !== activeFilters.location) return false;
    if (q) {
      const haystack = [p.species, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("total-badge").textContent = `${posts.length} 筆`;

  if (posts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => {
    const imgHtml = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" loading="lazy" alt="">`
      : `<div class="card-no-img">🦗</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    return `
      <div class="card" onclick="openModal(${POSTS.indexOf(p)})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-species">${p.species || "（物種未知）"}</div>
          ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
          <div class="card-text">${p.text || ""}</div>
          <div class="card-meta">
            <span>${p.author || ""}</span>
            <span>${ts}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";

  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

buildFilterLists();
renderGrid();
</script>
