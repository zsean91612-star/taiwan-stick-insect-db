mp": "2021-10-04", "text": "前陣子有天睡覺忘記關燈，半夜醒來看到房門外開趴了，頭燈照射範圍外還有三隻\n\n大雪山，海拔約2200，半夜不好拍照僅此一張，不知道是什麼竹節蟲", "images": ["dccdf4dae9045b01.jpg"], "species": "台灣竹節蟲（雌雄）", "location": "大雪山"}, {"post_id": "1967557456731202", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1967557456731202", "author": "品萱", "timestamp": "2021-08-21", "text": "2021/08/20\n阿里山森林遊樂區\n請教竹節蟲名稱", "images": ["2ad4c677be24c244.jpg", "235db6e3bcfc96f1.jpg", "585cea4640d995a7.jpg"], "species": "長肛竹節蟲", "location": "阿里山森林"}, {"post_id": "1876405812513034", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1876405812513034", "author": "", "timestamp": "2021-05-09", "text": "這是2021/4/10於宜蘭縣三星鄉龍泉步道採集的個體，參考黃世富先生著的《台灣的竹節蟲》，雖然胸部背板兩側沒有紅色帶狀條紋，但根據觸角長度、背板上的小顆粒，推論應為「粗粒皮竹節蟲」。只是比較好奇「雙色皮竹節蟲」和「台灣皮竹節蟲」身上難道完全都沒有小顆粒嗎?還是有但較不明顯?因為書、網路上的照片感覺都不是那麼清楚，希望各位如果有比較清晰的照片可以借我學習一下，謝謝~", "images": ["49f8c364572347b3.jpg", "3c04699bb8528528.jpg", "a9f34baf31c2a8be.jpg"], "species": "長肛竹節蟲", "location": "於宜蘭縣三星鄉龍泉步道"}, {"post_id": "1828662077287408", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1828662077287408", "author": "陳升", "timestamp": "2021-03-07", "text": "請問是何種竹節蟲??20210305烏來瀑布公園", "images": ["1fe764ad7a2ed075.jpg"], "species": "台灣竹節蟲", "location": ""}, {"post_id": "1804847393002210", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1804847393002210", "author": "吳威漢", "timestamp": "2021-02-02", "text": "打擾各位...對竹節蟲不太熟\n特來請教蟲名。謝謝\n\n2021.01.22 台北市文山運動中心旁", "images": ["42fa20ae399a162e.jpg"], "species": "長肛竹節蟲", "location": "台北市文山"}, {"post_id": "1719934768160140", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1719934768160140", "author": "David Tai", "timestamp": "2020-10-23", "text": "請教這是哪種竹節蟲？\n20201022@烏來瀑布公園", "images": ["4f5e5a20cb522cfb.jpg"], "species": "素木氏瘤竹節蟲", "location": ""}, {"post_id": "1612115288942089", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1612115288942089", "author": "黃恩偉", "timestamp": // ─────────────────────────────────────────────────────────────────────────────

let activeFilters = { species: "", location: "" };
let searchQuery = "";

// 去除尾部的性別標註，取得物種基本名
function speciesBase(sp) {
  return sp ? sp.replace(/（[雌雄]+）$/, "").trim() : "";
}

function buildFilterLists() {
  // 物種以 baseName 分組計數
  const speciesCounts = {};
  const locationCounts = {};
  POSTS.forEach(p => {
    if (p.species) {
      const base = speciesBase(p.species);
      speciesCounts[base] = (speciesCounts[base] || 0) + 1;
    }
    if (p.location) locationCounts[p.location] = (locationCounts[p.location] || 0) + 1;
  });

  const sList = document.getElementById("species-list");
  document.getElementById("species-all-count").textContent = POSTS.length;
  Object.entries(speciesCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("species", name, li);
      sList.appendChild(li);
    });

  const lList = document.getElementById("location-list");
  document.getElementById("location-all-count").textContent = POSTS.length;
  Object.entries(locationCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("location", name, li);
      lList.appendChild(li);
    });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const list = type === "species"
    ? document.getElementById("species-list")
    : document.getElementById("location-list");
  list.querySelectorAll("li").forEach(li => li.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return POSTS.filter(p => {
    if (activeFilters.species && speciesBase(p.species) !== activeFilters.species) return false;
    if (activeFilters.location && p.location !== activeFilters.location) return false;
    if (q) {
      const haystack = [p.species, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("total-badge").textContent = `${posts.length} 筆`;

  if (posts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => {
    const imgHtml = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" loading="lazy" alt="">`
      : `<div class="card-no-img">🦗</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    return `
      <div class="card" onclick="openModal(${POSTS.indexOf(p)})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-species">${p.species || "（物種未知）"}</div>
          ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
          <div class="card-text">${p.text || ""}</div>
          <div class="card-meta">
            <span>${p.author || ""}</span>
            <span>${ts}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";

  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

buildFilterLists();
renderGrid();
</script>
</body>
</html>
