<style>
  :root {
    --bg: #f5f7f0;
    --card-bg: #ffffff;
    --accent: #3a7d44;
    --accent-light: #e8f5e9;
    --text: #2c3e2d;
    --muted: #6c7e6d;
    --border: #d0dbd1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: white;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header .subtitle { font-size: .8rem; opacity: .85; }
  .header-nav { display: flex; gap: .6rem; margin-left: auto; }
  .header-nav a {
    color: rgba(255,255,255,.8); text-decoration: none;
    font-size: .82rem; padding: .2rem .65rem;
    border-radius: 999px; border: 1px solid rgba(255,255,255,.35);
  }
  .header-nav a:hover, .header-nav a.active {
    background: rgba(255,255,255,.2); color: white;
  }
  #total-badge {
    background: rgba(255,255,255,.2);
    border-radius: 999px;
    padding: .2rem .8rem;
    font-size: .85rem;
  }

  /* ── Layout ── */
  .layout { display: flex; gap: 0; }

  /* ── Sidebar / Filters ── */
  aside {
    width: 240px;
    min-width: 240px;
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    padding: 1.2rem;
    height: calc(100vh - 60px);
    overflow-y: auto;
    position: sticky;
    top: 60px;
  }
  aside h2 {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: .6rem;
  }
  #search {
    width: 100%;
    padding: .5rem .7rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    margin-bottom: 1.2rem;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  .filter-list { list-style: none; margin-bottom: 1.4rem; }
  .filter-list li {
    padding: .3rem .5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: .88rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .filter-list li:hover { background: var(--accent-light); }
  .filter-list li.active { background: var(--accent); color: white; }
  .filter-list li .count {
    font-size: .75rem;
    opacity: .7;
    background: rgba(0,0,0,.08);
    border-radius: 999px;
    padding: .05rem .45rem;
  }
  .filter-list li.active .count { background: rgba(255,255,255,.2); }

  /* ── Main grid ── */
  main {
    flex: 1;
    padding: 1.2rem;
    overflow-y: auto;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 1px solid var(--border);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.12); }
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--accent-light);
    display: block;
  }
  .card-no-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-body { padding: .75rem; }
  .card-species {
    font-weight: 600;
    font-size: .9rem;
    color: var(--accent);
    margin-bottom: .2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-location {
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .35rem;
  }
  .card-location::before { content: "📍 "; }
  .card-text {
    font-size: .8rem;
    line-height: 1.4;
    color: #555;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    margin-top: .5rem;
    font-size: .72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  #empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    display: none;
  }
  #empty .icon { font-size: 3rem; margin-bottom: .5rem; }

  /* ── Modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 700px;
    width: 100%;
    overflow: hidden;
    position: relative;
  }
  #modal-close {
    position: absolute;
    top: .6rem;
    right: .7rem;
    background: rgba(0,0,0,.4);
    color: white;
    border: none;
    border-radius: 50%;
    width: 2rem;
    height: 2rem;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  #modal-imgs {
    display: flex;
    overflow-x: auto;
    gap: .4rem;
    background: #111;
    padding: .4rem;
    max-height: 420px;
  }
  #modal-imgs img {
    max-height: 400px;
    width: auto;
    border-radius: 6px;
    object-fit: contain;
    flex-shrink: 0;
  }
  #modal-body { padding: 1.2rem; }
  #modal-species {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: .3rem;
  }
  #modal-meta {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: .8rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  #modal-text {
    font-size: .9rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #modal-link {
    display: inline-block;
    margin-top: .8rem;
    font-size: .82rem;
    color: var(--accent);
    text-decoration: none;
  }
  #modal-link:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    aside { display: none; }
    #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>

"species": "長肛竹節蟲（雌）", "location": "植物園"}, {"post_id": "2994553747364896", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2994553747364896", "author": "湯興漢", "timestamp": "2025-03-08", "text": "2025.03.08，新店和美山步道，請問這是那種竹節蟲？", "images": ["7f744250e4ec944a.jpg"], "species": "長肛竹節蟲", "location": "步道"}, {"post_id": "2915066051980333", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2915066051980333", "author": "柏諺", "timestamp": "2024-12-11", "text": "2024/12/08 台東利嘉林道 想問名字", "images": ["ac1bdc1afed35112.jpg", "b84afe6e03e27f92.jpg", "ad8ab3c04d1f0b11.jpg", "bcdff42e1a17d204.jpg"], "species": "長肛竹節蟲（雌）", "location": "林道"}, {"post_id": "2909355669218038", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2909355669218038", "author": "Izumi Wang", "timestamp": "2024-12-04", "text": "想請問名字，謝謝！\n2024/11/30 烏來福山", "images": ["3f33f2e7a2579009.jpg"], "species": "短肛竹節蟲", "location": "烏來"}, {"post_id": "2908952742591664", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2908952742591664", "author": "張書銘", "timestamp": "2024-12-04", "text": "關於昨天有人在本國野外拍攝到外來種的事件，我想從我聽到其他外來種通報與移除的案例中分享一些事情\n\n1.在野外拍到外來種竹節蟲已經不是第一次，有野生環境的照片出來還是要先冷靜詢問拍攝地點，因為有可能是在國外拍攝或是拿到戶外擺拍。盡量不要在那裡吵架說這個地方沒有那種東西，或是可能是誰亂放，有可能po文的人真的不懂，這樣嚇到他們反而可能會讓他們刪文失去第一筆重要的紀錄\n\n2.如果要通報外來種，可以打電話給縣政府或農業部處理。但以竹節蟲這種世代輪替相對較慢的昆蟲來說，我建議住附近的人可以到發現地點持續做觀察，多發現幾筆紀錄當證據，比較不會被當成逃逸無法形成族群的零星個案。（光是拍到一隻成蟲很難當成野外已經有族群的證據）\n\n3.不要急著號召大家去移除，因為不是所有人都會辨識或鑑定，怕有人會誤移除當地原生種\n\n本人最近比較少拍竹節蟲的照片，拿舊圖來放一下", "images": ["f366d104fa2ccaa5.jpg"], "species": "", "location": "野外"}, {"post_id": "2897448980408707", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2897448980408707", "author": "徐志文", "timestamp": "2024-11-20", "text": "請問?\n猜是素木氏瘤竹節蟲\n1131119新竹內灣", "images": ["d278e820af85f717.jpg"], "species": "素木氏瘤竹節蟲", "location": "新竹"}, {"post_id": "2877254562428149", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2877254562428149", "author": "廖子為", "timestamp": "2024-10-28", "text": "屏東2024.10.26\n請教種類", "images": ["6b63b1be91fe4f04.jpg"], "species": "長肛竹節蟲", "location": "屏東"}, {"post_id": "2856073954546210", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2856073954546210", "author": "鍾秉霖", "timestamp": "2024-10-15", "text": "請問一下，這是哪一種竹節蟲？在海拔2400m左右遇到！謝謝！", "images": ["73e4edabc39b520e.jpg"], "species": "皮竹節蟲", "location": "海拔"}, {"post_id": "2800527800100826", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2800527800100826", "author": "Tony Yang", "timestamp": "2024-08-26", "text": "2024.08擬瓦腹華竹節蟲雌成蟲觀察於新北三峽海拔約900m山區之前也曾在此棲地觀察過擬瓦腹華雄成蟲…… 查看更多", "images": ["49b7b38b2535eacd.jpg", "9944f4cd1260312d.jpg", "c67ba2842e0cb6f1.jpg", "49c22a118f9935c2.jpg"], "species": "擬瓦腹華竹節蟲", "location": "海拔"}, {"post_id": "2781759901977616", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2781759901977616", "author": "呂清", "timestamp": "2024-08-06", "text": "8/2攝於台中山區，海拔約2100公尺由照片中的比例尺可知體長不到8公分現場沒注意，回來看照片判斷應該是成蟲翻閱《台灣的竹節蟲》後，由像銅環的尾毛這個特徵猜測可能是楚南式小異竹節蟲，但分佈海拔遠高於書中所述的1200公尺，所以來社團請教各位前輩這隻是否為楚南式小異竹節蟲", "images": ["1a5bf6b2234bf99b.jpg", "d28f2b180da33ef0.jpg"], "species": "小異竹節蟲", "location": "海拔"}, {"post_id": "2768649743288632", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2768649743288632", "author": "韓羲之", "timestamp": "2024-07-21", "text": "請教竹節蟲, 謝謝林彧綦網大:\n#長肛竹節蟲屬(Entoria).\n24.7.台東.", "images": ["72f38397d7cfc35f.jpg"], "species": "長肛竹節蟲", "location": "台東"}, {"post_id": "2764327823720824", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2764327823720824", "author": "簡廷仰", "timestamp": "2024-07-16", "text": "2023.6 桃園復興 海拔約1900\n請教可能的種類？感謝回覆", "images": ["ad2ca982a1f16457.jpg"], "species": "", "location": "海拔"}, {"post_id": "2763186660501607", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2763186660501607", "author": "孫國鈞", "timestamp": "2024-07-14", "text": "#短肛竹節蟲？？？\n二子坪步道 2024/7/14", "images": ["dc2ee044fa0f0ba7.jpg", "2 陽明山"}, {"post_id": "2737013973118876", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2737013973118876", "author": "湯興漢", "timestamp": "2024-06-10", "text": "2024.06.10，新店二叭子植物園，請問這是甚麼竹節蟲？", "images": ["514791fba7ed26a6.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2736023559884584", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2736023559884584", "author": "湯興漢", "timestamp": "2024-06-09", "text": "20240609，新店二叭子植物園，請問這是甚麼竹節蟲？挺大隻的，超過10cm....", "images": ["e7ba4490fdc53a29.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2699342763552664", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2699342763552664", "author": "", "timestamp": "2024-04-20", "text": "最近在確認巨人葉䗛的食性，採了不少種植物的葉子給牠們吃，結果意外發現麗緹葉䗛比起芭樂葉，更喜歡吃龍眼的葉子，角落的芭樂葉和龍眼葉都是昨天採回來的，結果芭樂葉上面一點食痕都沒有...", "images": [], "species": "", "location": ""}, {"post_id": "2683119045175036", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2683119045175036", "author": "林彧綦", "timestamp": "2024-03-28", "text": "關於長肛竹節蟲的幾個疑惑：1.台灣到底有幾個長肛竹節蟲屬的物種？我看台灣物種名錄裡顯示有12種，但其中有不少種在TBN與台灣生命大百科上缺乏觀測紀錄與相關資料，或是在網路上幾乎找不到任何圖片與資訊。目前資訊比較多的只有台灣、台北、銅門與恆春四個物種而已。2.長肛的雄蟲有幾個齡？我記得雄蟲的齡期通常會比雌蟲少，我自己數出來應該是6個，但我不太確定。…… 查看更多", "images": ["80c5cafb3c99b462.jpg", "a8bc93ce3b8d0bac.jpg", "f4d34e7a4dc9c9b3.jpg", "1d7f09aaee13263c.jpg"], "species": "長肛竹節蟲", "location": "台北"}, {"post_id": "2623875341099407", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2623875341099407", "author": "林彧綦", "timestamp": "2024-01-01", "text": "想請問這是長肛還是短肛的若蟲呢？第三張圖是幾週前蛻皮完的樣子採集地：新北市瑞芳區金瓜石", "images": ["a9e32f354a76f571.jpg", "882820070ed6321b.jpg", "5de459d42d26b014.jpg"], "species": "", "location": "新北"}, {"post_id": "2610418955778379", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2610418955778379", "author": "Joice  Ho", "timestamp": "2023-12-12", "text": "台南大遠百成功店（後火車站對面）活動時間：2023/12/01(五)-2023/12/17(日)櫃位樓層：1F 大門口導覽時間   …… 查看更多", "images": ["97ffe5ec5cc4d 日本棘竹節蟲", "location": "步道"}, {"post_id": "2483804455106497", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2483804455106497", "author": "孫國鈞", "timestamp": "2023-06-10", "text": "#皮竹節蟲 若蟲 2023/6/10陽明山苗圃步道", "images": ["4a292f2ebc860092.jpg", "acacb04bfe36ea6d.jpg"], "species": "皮竹節蟲", "location": "步道"}, {"post_id": "2483162898503986", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2483162898503986", "author": "孫國鈞", "timestamp": "2023-06-09", "text": "#截角華竹節蟲\n2023/6/9陽明山苗圃步道\n25°09'30.1\"N 121°32'49.5\"E", "images": ["e3d5f4612178ae50.jpg", "b5321556d3429a3e.jpg", "aaa966457232e937.jpg"], "species": "截角華竹節蟲", "location": "步道"}, {"post_id": "2479995888820687", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2479995888820687", "author": "葉宜欣", "timestamp": "2023-06-05", "text": "請問這是截角華竹節蟲嗎？ 謝謝\n112.6.5陽明山二子坪", "images": ["783740ae8bc8caec.jpg"], "species": "截角華竹節蟲", "location": "陽明山"}, {"post_id": "2478734145613528", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2478734145613528", "author": "Tony Yang", "timestamp": "2023-06-03", "text": "20230603\n@尖石宇老\n從青剛櫟搖下來的\n還是若蟲無法辨認種類\n希望長大後是擬瓦腹華或截角華", "images": ["db22b826d340fde2.jpg"], "species": "", "location": "尖石"}, {"post_id": "2475374532616156", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2475374532616156", "author": "", "timestamp": "2023-05-29", "text": "隨著加入的人越多，我覺得應該開始要用好的問題篩選加入的人，到底加入這個社團該具備什麼能力?\n最後我決定留下這三個問題：\n第一個問題有做到的話，能教你怎麼養竹節蟲，把最容易養失敗的一些因子避免掉\n第二個問題看似很難，但會猜選項的人應該都知道會是2選1。網路上應該能輕鬆查到答案，如果答錯連長相近似的昆蟲都無法區分，那我不知道加入這裡的人該從何認識起竹節蟲…… 查看更多", "images": ["735da362d97bf453.jpg", "c67cf78ac740de1d.jpg"], "species": "", "location": ""}, {"post_id": "2467357583417851", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2467357583417851", "author": "", "timestamp": "2023-05-18", "text": "遇到這種問題通常我都是一律建議回去找給你這隻蟲的人問，但今天我想告訴大家，這裡的回覆質量跟另一個社團相比是有點差別的…… 查看更多", "images": ["4835f4c5a0f095ec.jpg"], "species": "", "location": ""}, {"post_id": "2457127954440814", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2457127954440814", "author": "", "timestamp": "2023-05-04", "text": "請問葉脩算竹節蟲嗎？還是算螳螂的一種，這問題困擾我很久了，求解答，還有台灣哪些植物能找到野生的葉脩", "images": [], "species": "", "location": ""}, {"post_id": "2418670261619917", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2418670261619917", "author": "", "timestamp": "2023-03-11", "text": "芭樂巴巴巴  x 出攤（3/11-12）公告\n\n台北本週花博農民市集出攤！\n今天天氣非常好\n歡迎大家來聊天和補貨果汁 \n\n本週一樣有限量的雞蛋\n因為數量真的太少\n來到攤位上說出暗號“老闆我要買雞蛋”\n老闆才會拿出來喔！\n\n另外這禮拜有新鮮的芭樂枝條\n有養竹節蟲、葉䗛的歡迎來補充食草！\n\n 台北花博農民市集 攤位83號\n日期  ❙ 3月11日、12日（六、日）\n時間  ❙ 10：00 - 18：00\n地點  ❙ 臺北市中山區玉門街1號（捷運圓山站1號出口）\n\n 在家還可以買這些\n 珍珠脆脆  reurl.cc/XjLxl0\n 芭樂果乾  reurl.cc/e6YEd7\n 100%芭樂鮮果汁  reurl.cc/V13n4b\n以上商品也可Linepay付款或匯款後郵寄/黑貓快遞到府，如有需求請直接私訊我們\n\n 其他社群經營\nLINE社群  reurl.cc/Lpj0R7\n官方噗浪帳號  reurl.cc/oez9N3\n\n#市集人生 #擺攤人生 #花博農民市集 #葉䗛 #麗緹葉䗛 #葉竹節蟲 #竹節蟲 #動福蛋 #雞蛋 #青年農夫 #青農 #小農 #芭樂 #芭樂巴巴巴 #草生栽培 #產銷履歷驗證 #生產溯源 #無農藥 #無添加 #芭樂汁 #芭樂葉茶 #芭樂果乾 #芭樂凍乾 #珍珠脆脆 #直接跟農夫買", "images": ["22177a7446ada96d.jpg"], "species": "", "location": ""}, {"post_id": "2377901105696833", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2377901105696833", "author": "", "timestamp": "2023-01-19", "text": "大家好，想徵求以下各種竹節蟲成蟲1~2隻作為兒童自然教學使用，因為自己養的竹節蟲都還小，希望能台北面交或是寄送\n徵求物種：泰國小紅翅 豔陽扁 巨棘 各種葉脩 綠椒 幽靈 棉桿等等\n希望願意提供的大大可以留言告知，感謝社團", "images": [], "species": "", "location": ""}, {"post_id": "2334651970021747", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2334651970021747", "author": "", "timestamp": "2022-11-30", "text": "我是覺得不要太早下「每個生命都是重要」這種結論，等到卵多到你沒有辦法送人時你就會開始發現現實能做的處理與你原本的價值觀衝突", "images": [], "species": "", "location": ""}, {"post_id": "1939835812836700", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1939835812836700", "author": "", "timestamp": "2022-11-18", "text": "我不知道這串留言的後續，但之前我看到一個在社團裡養過棉桿的人把明明不是棉桿的東西鑑定成棉桿我就很想講了。竹節蟲社團是專門討論竹節蟲的地方，大部分裡面的資訊都比網頁上找新很多，如果你是喜歡幫忙回答問題的人，在回答別的社團的問題前不來這裡查資料，我只能說非常可惜\n\n另外，會我把我之前瘤竹節整理的文章放在留言區，大家有空可以看看", "images": [], "species": "", "location": ""}, {"post_id": "2246800352140243", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2246800352140243", "author": "", "timestamp": "2022-08-23", "text": "請google搜尋“發霉”，到時候在卵上看到相同顏色或形狀就是了", "images": [], "species": "", "location": ""}, {"post_id": "2232317296921882", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2232317296921882", "author": "", "timestamp": "2022-08-04", "text": "剛開始養葉脩時，因為數量少又怕養死，每隻都當寶一樣細心呵護 ，食草未枯萎或吃完前就換掉。加上大空間和良好的溫濕度控制，大多數體態都很完整。累代後蟲的數量大增，體態自然不佳。", "images": ["813e7097bb0bf1ee.jpg", "3d662d050ff35699.jpg", "5ae81fe2e907c532.jpg", "a1c8ed4b4579cf4c.jpg"], "species": "", "location": ""}, {"post_id": "2217862008367411", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2217862008367411", "author": "", "timestamp": "2022-07-15", "text": "有時候，修剪芭樂葉是一兼二顧的好事，看這一株芭樂樹都長到馬路上來了，我再不自告奮勇修剪一下，被投訴時可就會被砍的很徹底了！…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "2213101792176766", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2213101792176766", "author": "", "timestamp": "2022-07-09", "text": "#新手分享\n今天碰巧看到棉干竹節蟲生蛋，真蠻不可思議的。從五月一日到今天，一齡接手到現在，整個過程真的很不可思議，也感謝各位分享各種知識。", "images": [], "species": "", "location": ""}, {"post_id": "2202798059873806", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2202798059873806", "author": "", "timestamp": "2022-06-26", "text": "2022.06.26 墾丁國家公園\n津田氏大頭竹節蟲\nMegacrina tsudai \n本種為台灣唯一的保育類竹節蟲，禁止採集、觸摸。津田氏大頭竹節蟲為夜行性，如果想要觀察可以挑晚上出門觀賞，會比較容易找到", "images": ["25df7e62325a166a.jpg", "cda7018d8c51f75c.jpg"], "species": "", "location": ""}, {"post_id": "2192738807546398", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2192738807546398", "author": "", "timestamp": "2022-06-14", "text": "請教各位，不曉得有沒有人知道野外竹節蟲生存率如何？一隻母蟲就可以產下百餘顆卵，但是卻很難在野外看到竹節蟲，是因為生存率很低（被吃掉），還是因為偽裝術太強？上網也查不到這一類的訊息。還請專業蟲友們指點一下。謝謝大家。", "images": [], "species": "", "location": ""}, {"post_id": "2184454385041507", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2184454385041507", "author": "", "timestamp": "2022-06-03", "text": "分享野外觀察．竹節蟲》\n若同好可判別類型，也請不吝賜教～\n時間：20220603\n發現地：面天山步道（海拔約500公尺）…… 查看更多", "images": ["686d5ad4198d5c05.jpg", "1f7cdd846d77f0fd.jpg", "2d83baf82947b44f.jpg", "d68f8651cd19b1b0.jpg"], "species": "", "location": ""}, {"post_id": "2175777155909230", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2175777155909230", "author": "", "timestamp": "2022-05-23", "text": "這是別人給的還是哪裡採的?如果是別人給的應該就要先問他這是什麼。在完全沒有背景知識的情況下，不要自己隨便判斷，竹節蟲的分類與鑑定沒有你想像中簡單，網路上的文章根本不會教你鑑定竹節蟲的有效特徵跟重點，這高機率不是尖刺足刺。專業且正確的鑑定比他們可以吃什麼…… 查看更多", "images": ["85cc09b2db541378.jpg"], "species": "", "location": ""}, {"post_id": "2160211794132433", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2160211794132433", "author": "", "timestamp": "2022-05-04", "text": "請教一下各位有養菲律賓葉䗛的蟲友們，菲律賓葉䗛會咬人嗎？我把葉䗛放我手上，會看到葉䗛把頭壓低，疑似在咬我的手，但是我卻不覺得痛（葉䗛只有三齡）。如果不是在咬人，那有沒有蟲友知道葉䗛為何會把頭壓低，做出疑似咬人的動作？謝謝各位蟲友。", "images": [], "species": "", "location": ""}, {"post_id": "2143631382457141", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2143631382457141", "author": "", "timestamp": "2022-04-13", "text": "「已經徵到了！謝謝大家的熱心幫忙！感恩感恩！！\n」大家好，我女兒今年小4，自然課要觀察昆蟲，她想要養竹節蟲，我都不知道要去哪裡給她抓一隻，很頭痛！不知道是否有台中的大大可以分享我一隻竹節蟲呢？先謝謝大家！感恩感恩", "images": [], "species": "", "location": ""}, {"post_id": "2134569943363285", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2134569943363285", "author": "", "timestamp": "2022-04-01", "text": "上次徵过了幽灵\n但成效不太好\n最近看到很多大神孵了很多小幽灵\n想来再徵一次！\n可以的话希望有成虫qwq…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "2129896587163954", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2129896587163954", "author": "", "timestamp": "2022-03-26", "text": "葉脩為什麼不能跟其他種類的竹節蟲混養?\n\n最近不論是在留言區、私訊甚至是昨天去到老闆店裡都有一堆人在問這個問題，答案已經在截圖裡了\n\n對沒錯，葉脩很容易被其他竹節蟲當成葉子吃掉或咬死!而且被咬的時候基本上他們也不太會逃跑，所以不建議混養\n\n希望這樣社團裡所有人都能看到這篇文，也能解答所有正在為這個問題疑惑的人，這個問題最近有點氾濫了", "images": [], "species": "", "location": ""}, {"post_id": "2081830668637213", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2081830668637213", "author": "", "timestamp": "2022-01-21", "text": "麻煩大家不要隨便關留言，事情討論完了，可以刪掉或關通知，不要關留言放在那，我知道這個社團很多人對生物學的基礎概念趨近於0，所以常常會有錯誤的訊息被討論，管理員看到某人講了很錯誤的東西會想留言解釋，但這種情況又沒辦法留，只能用這種方式讓本來講錯話的人會很尷尬\n\n棉桿能不能放生野外這件事情以前在社團被討論過幾次，大家可以用棉桿在社團搜尋關鍵字找找，先說結論就是不行，主要理由有兩個，第一個是因為你不知道你放生的地方有沒有棉桿，如果沒有，放在這個地方可能會影響到當地的生態系，最嚴重的情況就是生態系被破壞，某些物種在這個地方會被消失；第二個原因是，就算在你知道你放生的野外有棉桿的情況下，你不知道被你養過的棉桿和原來生活在野外的棉桿，會不會有一些不好的交互作用發生(例如種內競爭)，嚴重的話野生族群會被取代掉，讓後續生物學家很難在當地去做研究\n\n細講其實還有很多複雜的原因，我只講一些大家比較好懂的部分，如果我有講錯歡迎懂生態學的大大在下方指正或補充，謝謝", "images": [], "species": "", "location": ""}, {"post_id": "2059526940867586", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2059526940867586", "author": "", "timestamp": "2021-12-22", "text": "這一隻只要有食草基本上沒什麼難度，其實食草好像也還好啦，香蘭葉就可以養的很好了。\n住北部的朋友如果附近山區找得到山林投也是非常好的食草來源，各種園藝化的露兜樹科植物也可以餵養，真的再不行就去海邊採林投來餵囉！\n\nhttps://reurl.cc/Q6x9OO", "images": [], "species": "", "location": ""}, {"post_id": "2037794583040822", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2037794583040822", "author": "", "timestamp": "2021-11-22", "text": "編輯更新：大家反應太熱烈了，先暫時截止，讓我回去清點一下是否有足夠的數量繼續分享喔。\n（但台北捷運站面交，可以私訊我優先拿～）\n\n大家好，\n希望能分享葉䗛卵給需要的同好（無性世代），留言索取即可。\n\n台北可以討論捷運站面交，其他地區則以便利商店店到店寄出（但可能要給我運費）\n\n如果可以的話也想看看能不能換到幽靈的卵：）\n\n謝謝大家看到這邊，有問題或指教也歡迎留言詢問。", "images": [], "species": "", "location": ""}, {"post_id": "2037004583119822", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2037004583119822", "author": "", "timestamp": "2021-11-21", "text": "葉䗛原來也是蠻受歡迎的～\n最近有些夏天成蟲的葉䗛開始衰老死亡～\n這隻翅膀有點羽化不全，又被同籠的朋友啃得坑坑疤疤，發現牠剛死掉，本來想直接丟垃圾桶，突然不知道哪來的靈感，覺得龍蝨應該餓了～\n然後，就什麼都不剩了！！\n比丟垃圾桶還環保！！\n\n順便宣導一下～～\n竹節蟲成蟲死掉不要丟花圃或是戶外！可以用塑膠袋裝起來丟垃圾桶！為什麼呢？\n因為～如果他肚子裡的蛋是已經發育完全的，還是有機會孵出來喔！！\n如果堅持要「埋葬」，可以搭配噴幾下殺蟲劑，比較保險！或是⋯埋深一點吧～", "images": [], "species": "", "location": ""}, {"post_id": "1999913633495584", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1999913633495584", "author": "", "timestamp": "2021-10-04", "text": "前陣子有天睡覺忘記關燈，半夜醒來看到房門外開趴了，頭燈照射範圍外還有三隻\n\n大雪山，海拔約2200，半夜不好拍照僅此一張，不知道是什麼竹節蟲", "images": [], "species": "", "location": ""}, {"post_id": "1999239060229708", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1999239060229708", "author": "", "timestamp": "2021-10-03", "text": "一開始我不知道要噴水，養了一個月還好好的。現在亂噴水（噴在葉子跟壓克力都有），發現他們很愛喝水，趴在壓克力上一直啄的喝水，超可愛。", "images": [], "species": "", "location": ""}, {"post_id": "1958263497660598", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1958263497660598", "author": "", "timestamp": "2021-08-09", "text": "高雄贈送棉桿跟幽靈幼蟲。\n鼓山區九如橋下附近面交。", "images": [], "species": "", "location": ""}, {"post_id": "1949510581869223", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1949510581869223", "author": "", "timestamp": "2021-07-28", "text": "現在解封了，鼓勵大家在野外看到竹節蟲的照片都可以拍照附上時間地點Po上來問，其實竹節蟲的分類在台灣還沒有被做的很完整，更別說是生態跟其他領域了，很多物種都還是未知的狀態\n我們社團長期缺乏野外物種的照片(大家好像都比較習慣貼在其他社團?)，希望能多累積這些資源，也給未來想做研究的人一點幫助", "images": [], "species": "", "location": ""}, {"post_id": "1918491671637781", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1918491671637781", "author": "", "timestamp": "2021-06-23", "text": "求救\n今天早上還好好的，下班回來看到他垂掛在箱子最下方、屁股已著地，想幫他回到葉子上，發現四肢癱軟，對風、水霧都沒什麼反應，嘴巴有在動。之前有一隻也是這樣，當晚就死了⋯請問有辦法救嗎？還是能做什麼讓他舒服點？", "images": [], "species": "", "location": ""}, {"post_id": "1906130412873907", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1906130412873907", "author": "", "timestamp": "2021-06-15", "text": "最近一直給棉桿嘗試新的食草，苦楝跟同科的桃花心木，小葉欖仁，李氏櫻桃都吃。這次黃連木更快，剛放一小時就出現食痕。一查才發現原來是漆樹科的(芒果，羅氏鹽膚木都是這科的)", "images": [], "species": "", "location": ""}, {"post_id": "1876405812513034", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1876405812513034", "author": "", "timestamp": "2021-05-09", "text": "這是2021/4/10於宜蘭縣三星鄉龍泉步道採集的個體，參考黃世富先生著的《台灣的竹節蟲》，雖然胸部背板兩側沒有紅色帶狀條紋，但根據觸角長度、背板上的小顆粒，推論應為「粗粒皮竹節蟲」。只是比較好奇「雙色皮竹節蟲」和「台灣皮竹節蟲」身上難道完全都沒有小顆粒嗎?還是有但較不明顯?因為書、網路上的照片感覺都不是那麼清楚，希望各位如果有比較清晰的照片可以借我學習一下，謝謝~", "images": [], "species": "", "location": ""}, {"post_id": "1870304189789863", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1870304189789863", "author": "", "timestamp": "2021-05-01", "text": "分享剛剛看到網友傳的 ： https://www.facebook.com/nibo....../videos/280989413663583/", "images": [], "species": "", "location": ""}, {"post_id": "1850058385147777", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1850058385147777", "author": "", "timestamp": "2021-04-04", "text": "［想認識竹節蟲］\n大家好，小弟日前在桃園復興區發現了幾隻竹節蟲，竹節蟲變化多端，且資料比較稀少，在此想請教各位先進這些竹節蟲分別是什麼物種，希望各位不吝賜教。", "images": [], "species": "", "location": ""}, {"post_id": "1838205062999776", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1838205062999776", "author": "", "timestamp": "2021-03-19", "text": "社團人數達到2500人\n算是達到了一個小里程碑\n隨著社團新成員的增加\n我只想提醒一件事情\n在社團看到有人po照片問種類的時候\n不要直覺就回答棉桿\n我想很多人看到會很頭痛...", "images": [], "species": "", "location": ""}, {"post_id": "1818681324952150", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1818681324952150", "author": "", "timestamp": "2021-02-21", "text": "今天在昆蟲展得到的，6隻泰國小紅翅，之前養過3代棉稈，家裡附近有一顆芭樂樹，大約前2個星期前經過芭樂樹還在，所以今天去展覽想說可以領養沒有問題，結果回家時去看發現樹被砍掉了，之前養棉稈的時候附近都找遍了只有這一棵，3代棉稈都靠這一棵，所以可能沒辦法養了，希望有緣人能帶他們回家", "images": [], "species": "", "location": ""}, {"post_id": "1777082439112039", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1777082439112039", "author": "", "timestamp": "2020-12-27", "text": "最近有幾隻小紅翅孵出來，如果沒有芭樂，芒果或朱槿的葉子是可行的嗎？網路上查可以，但是放了好一陣子似乎都沒有咬痕", "images": [], "species": "", "location": ""}, {"post_id": "1733440433476240", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1733440433476240", "author": "", "timestamp": "2020-11-06", "text": "渣打葉脩或加爾達葉脩，P.gardabagusi. 產自印尼爪哇島argopuro 山 ，是近年新發現種。剛開始暫以P.sp argopuro blue coxae 命名。Blue coxae 是因為大腿連接身體處有藍色斑點為其特徵。體型不大，成蟲雌性約7公分，雄性約4公分。受驚擾時會釋放體味，味道很像目前盛開的黑板樹帶點腥味。", "images": [], "species": "", "location": ""}, {"post_id": "1693044470849170", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1693044470849170", "author": "", "timestamp": "2020-09-23", "text": "晚上幫竹節蟲卵噴水 看到一隻綠綠的 以為是蜘蛛嚇到 結果是第二代棉桿竹節蟲出生了 超小一隻好可愛 其他的應該會開始陸續出生 好神奇的竹節蟲 可以無性生殖 自從變成成蟲之後 一直再噴蛋 又要開始拔嫩葉給寶寶 \n5/6認養3顆 \n6…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1665338263619791", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1665338263619791", "author": "", "timestamp": "2020-08-24", "text": "剛剛在看到網路上看到\n\n【如何保濕竹節蟲的卵】\n\n大部分的人都多數採用\n\n拿個塑膠盒 內舖衛生紙 \n\n來保存濕度 \n\n但我自己用了一種方法\n\n拿插花海綿用的來保濕\n\n之後再拿塑膠箱裝起即可\n\n不知道大家對我這做法如何?\n\n謝謝大家", "images": [], "species": "", "location": ""}, {"post_id": "1663166220503662", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1663166220503662", "author": "", "timestamp": "2020-08-22", "text": "剛剛在整理竹便時，發現有些便裡有蠕動的蟲，是否代表竹寶有體內蟲的問題？不知道該如何解決啊！心慌。", "images": [], "species": "", "location": ""}, {"post_id": "1636760566477561", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1636760566477561", "author": "", "timestamp": "2020-07-24", "text": "請問混養竹節蟲\n會不會造成幽靈或是較大型的啃別人的情況？\n最近有發現小的葉脩以及小紅翅成蟲有被啃咬的跡象", "images": [], "species": "", "location": ""}, {"post_id": "1630996240387327", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1630996240387327", "author": "", "timestamp": "2020-07-18", "text": "我請住山上的親戚幫我採芭樂葉，採的太多了，我的蟲吃不完，放久也會爛掉枯掉，有住在北投附近的蟲友要嗎？可以拿一大把給你，捷運奇岩站也ok。限今天，明天就只能拿去冰冰箱了", "images": [], "species": "", "location": ""}, {"post_id": "1628549657298652", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1628549657298652", "author": "", "timestamp": "2020-07-15", "text": "重新招標了！今早發現一個人可以分得20顆蛋蛋！\n驚！所以接下來的人有福了！我們增加到五十組好了！歡迎大家附上回郵信封向我索取！先寄到的先回信，因為7/19-21，我要出去玩，回來再回信喔！咁蝦大家！！\n———————我是分隔線———————————\n送幽靈蛋蛋！10顆蛋蛋一組！請附回郵信封八元郵票！私訊我給地址喔！備註！有性生殖！先送20組喔！請想要的人，手腳要快！", "images": [], "species": "", "location": ""}, {"post_id": "1623005601186391", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1623005601186391", "author": "", "timestamp": "2020-07-09", "text": "今天為了買天天的蔬菜 意外發現旁邊有2大棵芭樂樹 而且芭樂都快爛了 這2顆應該沒人管吧 真開心 立馬剪2隻回家 又有葉子可以拔了", "images": [], "species": "", "location": ""}, {"post_id": "1619394614880823", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1619394614880823", "author": "", "timestamp": "2020-07-05", "text": "無奈⋯\n大概在5月底的時候，去找朋友的路上遇到這棵大芭樂樹，長在馬路邊，附近沒有作物，滿樹的粉蝨亂飛！當時心想～太棒了！又多一個地方可以採葉子了！當時馬上下車詢問對面住家是否可以剪，住家說那是自己長出來的可以剪沒關係！之後，每個禮拜報到，有一次對面阿姨還叫我剪多一點！！…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1613173182169633", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1613173182169633", "author": "", "timestamp": "2020-06-28", "text": "大家好，我是昆蟲系的學生，今年剛大學畢業，大約一年前開始養竹節蟲，加入這個社團不到半年。這幾個月以來發現社團裡大部份的社員對於台灣本土物種的概念非常不足，引起了一些亂象，想針對社團的這些亂象，用在學校的所學簡單跟大家推廣一些事情:\n1.大家在社團裡常見的小紅翅、葉虫脩、綠椒、幽靈等等，並不是台灣本土物種，如果不養請不要隨便放生，會影響到野外的自然生態。\n2.棉桿是目前被認為是本土物種，但也一樣不養不要隨意放生，不確定放生的環境是否適合他們，也不確定放生會不會影響本來就在那邊的物種。\n3.台灣在野外常見的竹節蟲，很多都長的蠻像的並不是只有棉桿、長肛或短肛，而且絕對不是只光靠身體顏色判斷。目前有4科11個屬，雖然台灣的竹節蟲物種分類還不是很明確，不確定有幾種，但至少用肉眼都可以分辨到屬這個類群，有人在社團裡發文鑑定時，不確定是甚麼類群或哪一種，請不要亂回答，會誤導到很多人。\n簡單來說就是不知道不要亂回答!不知道不要亂回答!不知道不要亂回答!!!!\n\n最後，圖片這隻是綠椒雄成蟲，希望大家看完都能按讚，達300讚辦小抽獎", "images": [], "species": "", "location": ""}, {"post_id": "1600673810086237", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1600673810086237", "author": "", "timestamp": "2020-06-14", "text": "#送棉桿\n\n讓人崩潰的小綠綠,母蟲都送人了,每天打開籠子卻還可以看到新孵出的小綠綠,不知道蛋蛋都藏在哪裡啊啊啊啊啊啊啊啊啊！\n\n@只送不賣\n@目測有10隻\n@找不到固定芭樂葉的人先不要喊\n@小港面交", "images": [], "species": "", "location": ""}, {"post_id": "1586960254790926", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1586960254790926", "author": "", "timestamp": "2020-05-30", "text": "有些公園，會有園藝公司定期去噴藥，因為他們去尋視時，發現有蟲害時，或者民眾跟里長反應有毛毛蟲時就會去噴了！\n我們家前面自己種的芭樂樹，之前採給竹節蟲吃，掛了快一半，原因是病媒蚊防治來噴水溝時，噴到了！…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1565086583644960", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1565086583644960", "author": "", "timestamp": "2020-05-05", "text": "想請教各位先進\n我家的\"斑點\"(小名)昨天上午發現牠脫殼後就一直是這樣的姿勢，本來到今早還有微微的動靜，到了下午後就完全不動 而且開始有點乾燥了，是死掉了嗎？\n另外一隻母的大隻的\"棠娘\"，昨天瘋狂進食後  今天也活動量變少，是因為又要脫殼了嗎？…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1561770640643221", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1561770640643221", "author": "", "timestamp": "2020-05-01", "text": "各位大大小弟第一次養竹節蟲還不是很懂\n今天看到他脫完皮翅膀長出來了\n請問這樣已經算成蟲了嗎？\n請問這樣看得出公母嗎？\n中間右邊的腳斷了一小節但沒找到殘骸是為什麼？…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1480506328769653", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1480506328769653", "author": "", "timestamp": "2020-01-31", "text": "請問各位大大，新竹市區哪裡有芭樂樹，今天發現新竹後火車站的芭樂樹被砍了，現在缺芭樂葉，拜託各位大大告訴小弟新竹市哪裡能摘芭樂葉，感激不盡", "images": [], "species": "", "location": ""}, {"post_id": "1376101065876847", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1376101065876847", "author": "", "timestamp": "2019-10-19", "text": "大創看到的 直接買兩個回家\n如果往下蓋著 下面沒有完全平整 \n不過是小事 再想辦法解決\n各位蟲友覺得如何?\n一個才49…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1350641188422835", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1350641188422835", "author": "", "timestamp": "2019-09-21", "text": "《推薦》\n這個露營用的置物箱，在幾個月前在美式知名賣場就有看到了，當時第一反應就是這個好像能養竹節蟲！！不過當時抬頭看一下價錢，馬上就打退堂鼓，我記得1500元左右～…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "1266384750181813", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1266384750181813", "author": "", "timestamp": "2019-06-02", "text": "這是兩隻剛成蟲的PT, 一隻綠色一隻黃色的，當然還有公蟲，養了2代了，想想還是送給學校給小孩看看自然的奇特，有需要的老師可以聯繫我，只有一組\n條件\n1，學校要有環境及食材\n2，一次給2公2母，黃跟綠色母蟲，小孩才可以比較\n3，要面取不寄送，怕熱死，我也懶，台北捷運古亭站面交", "images": [], "species": "", "location": ""}, {"post_id": "1266021900218098", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1266021900218098", "author": "", "timestamp": "2019-06-01", "text": "香拔，又名小果芭樂、細葉芭樂，是正宗的台灣土芭樂，植株只有30cm~200cm高、葉子細小，連結果也很小－最大約只有拇指與食指圈起來的直徑，不僅適合家庭園藝與盆栽種植，也有人做成盆景供觀賞。\n\n香拔以果實香味濃郁而得名，葉子可以泡茶（芭樂心葉茶）、果實直接食用香脆可口、也可切片曬乾泡茶（芭樂茶），不只是優良健康飲品，據說還可治療糖尿病。\n\n香拔與其他芭樂一樣，喜歡陽光充足、但夏季正午的強烈紫外線要稍遮以避免『日燒』，對土壤酸鹼度適應廣，從PH5.0的酸性到PH7.5的微鹼性都可生長良好，但要特別注意香拔耐旱不耐濕，土壤一定要排水良好，加上是多年生植物，建議採用有強化微量元素供應的『手工特調中性混和土』，另外還可額外增加苦土石灰來額外補充鈣鎂。\n\n芭樂的開花結果是在側枝而非主枝，所以每年冬末春初要加以修剪促進側枝萌發才會開花結果旺盛，同時也要稍微除去較弱的枝條修整樹形，開花結果時主枝會繼續往上生長，得保留枝條遮陰才不會造成果實被強烈紫外線曬傷。", "images": [], "species": "", "location": ""}, {"post_id": "1048032262017064", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1048032262017064", "author": "", "timestamp": "2018-07-24", "text": "請問竹節蟲不能跟鼠婦養一起嗎？\n我今天設好新的環境，\n看起來沒有什麼問題\n晚上突然發現找不到我的幽靈\n結果已經變屍體了⋯⋯", "images": [], "species": "", "location": ""}, {"post_id": "1010006499152974", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1010006499152974", "author": "", "timestamp": "2018-06-17", "text": "20180616嘉義縣竹崎鄉光華\n牛山步道\n雲霧帶吃咬人貓的竹節蟲,大約在3平方公尺的咬人貓上發現8隻竹節蟲,有褐色及綠色兩種色型.\n剛剛才看到版主傳授的辨識重點 不曉得有限的圖片能不能看出種類?請教大家這是?", "images": [], "species": "", "location": ""}, {"post_id": "999907793496178", "post_url": "https://www.facebook.com/groups/506259886194307/posts/999907793496178", "author": "", "timestamp": "2018-06-03", "text": "希望有養外來種竹節蟲的各位前輩，不要把牠放生到台灣的自然界，不然對本土的竹節蟲是種禍害。在此謝謝您!", "images": [], "species": "", "location": ""}, {"post_id": "999875793499378", "post_url": "https://www.facebook.com/groups/506259886194307/posts/999875793499378", "author": "", "timestamp": "2018-06-03", "text": "黑魔鬼竹節蟲就堅持不吃芭樂啊(女貞、光臘樹)\n其實長肛是多食性的(多食性才不會有缺食物的問題)，像我的長肛賣家只餵芭樂，但是後來發現葛藤、山黃麻、辟荔都會吃，試驗食材時，記得要放一枝它必定會吃的食材，如果發現實驗的食材有被吃，那就是會吃", "images": [], "species": "", "location": ""}, {"post_id": "850704335083192", "post_url": "https://www.facebook.com/groups/506259886194307/posts/850704335083192", "author": "", "timestamp": "2017-08-24", "text": "[分享文]\n昨天去動物園，在園區地板上撿到一隻竹節蟲，看似死亡，放在手上許久也都不會動，整個都乾癟癟的，兒子覺得可能還沒死，就趕快拿水噴灑，結果發現牠的腳有點抽動，就決定帶回家照顧，牠現在活力不錯，也開始吃了\n***想請問各位大大們***\n【這是什麼種類的竹節蟲?】…… 查看更多", "images": [], "species": "", "location": ""}, {"post_id": "833342563486036", "post_url": "https://www.facebook.com/groups/506259886194307/posts/833342563486036", "author": "", "timestamp": "2017-07-20", "text": "今年五月底去沙巴1200m山上某種葉脩公蟲，這裡的葉脩查書才發現其實有好幾種，是哪一種也不太確定。\n有沒有大大可以解惑一下，感謝", "images": [], "species": "", "location": ""}, {"post_id": "818235838330042", "post_url": "https://www.facebook.com/groups/506259886194307/posts/818235838330042", "author": "", "timestamp": "2017-06-24", "text": "20170622嘉義縣隙頂之星步道\n顏色豐富，請問這隻是?\n皮竹節蟲，感謝廖文泉兄，湯興漢秒解!!\n另外感謝 楊柏晉回應 \" 應該是雙色皮竹節蟲\"", "images": [], "species": "", "location": ""}, {"post_id": "776296849190608", "post_url": "https://www.facebook.com/groups/506259886194307/posts/776296849190608", "author": "", "timestamp": "2017-04-08", "text": "請教各位：\n綠椒竹節蟲雌雄該如何分辨？因網路上資料不多我無法確定，有一說法是用體色區分（雌為綠，雄為棕），但還有人說雌翅膀退化很小，雄翅膀長可飛，想請問到底雌雄如何分辨？（目前這隻是棕色，翅膀非常小，約15cm）剛接觸竹節蟲，煩請各位高手解答！！還有，這隻應該已是成蟲了吧？此種類是需要交配才能產出下一代的對吧？如果一開始體色就是棕色有可能又變綠色嗎？感謝各位～！", "images": [], "species": "", "location": ""}, {"post_id": "759435834210043", "post_url": "https://www.facebook.com/groups/506259886194307/posts/759435834210043", "author": "", "timestamp": "2017-03-10", "text": "重大公告!~\n津田氏大頭竹節蟲（學名：Megacrania tsudai）發現 \" 公蟲 !! 啦!!!~\n一向行孤雌生殖的牠終於找的到如意郎君了，族群的基因也終於可以流動啦!~\n2017/3/10，中興大學8樓-常態設展", "images": [], "species": "", "location": ""}, {"post_id": "649249725228655", "post_url": "https://www.facebook.com/groups/506259886194307/posts/649249725228655", "author": "", "timestamp": "2016-08-12", "text": "今天早上去看竹節蟲的時候，發現很多螞蟻再那邊爬來爬去的，擔心竹節蟲被攻擊，馬上換盆栽0.0剛剛上網查了一下原來竹節蟲的卵會吸引螞蟻過來...看來又有竹節蟲要傳宗接代準備離開了", "images": [], "species": "", "location": ""}, {"post_id": "648468291973465", "post_url": "https://www.facebook.com/groups/506259886194307/posts/648468291973465", "author": "", "timestamp": "2016-08-10", "text": "個位，如果在野外遇到竹節蟲幫我抓\n我想養 謝謝", "images": [], "species": "", "location": ""}, {"post_id": "626399724180322", "post_url": "https://www.facebook.com/groups/506259886194307/posts/626399724180322", "author": "", "timestamp": "2016-06-22", "text": "現在天氣那麼熱！請問大家你們都把愛蟲放置哪裡呢？ 我是放在陽台不過發現太熱了，今天搬去頂樓，那邊有風比較清涼，怕愛蟲中暑了", "images": [], "species": "", "location": ""}, {"post_id": "533930513427244", "post_url": "https://www.facebook.com/groups/506259886194307/posts/533930513427244", "author": "", "timestamp": "2015-10-24", "text": "去找野生的鴨嘴獸順便找到了幽靈竹節蟲！那邊位於Yungaburra, QLD剛好是它的產地。周邊的山區還有綠色型的雌蟲。", "images": [], "species": "", "location": ""}, {"post_id": "532716456881983", "post_url": "https://www.facebook.com/groups/506259886194307/posts/532716456881983", "author": "", "timestamp": "2015-10-20", "text": "徵--各種昆蟲標本and自然的書\n\n本人喜歡小孩，因有機會上去梨山、環山部落地區的國小坐坐，看見當地的孩子非常喜歡大自然，且樂於親近，若善加發揮對他們將是莫大的助益，像是成為世界頂尖的昆蟲教授等等\n\n但是，很明顯的他們比較缺乏一些資源，沒有圖書館，沒有專家老師教授，很可惜，而標本，書集等，是我們比較豐富的，但是他們沒有，這有使人才無法發揮的危險\n\n所以，本人想送ㄧ些昆蟲標本，自然的書給他們，讓他們跟我們一樣有學習的機會，但只憑我的力量，實在很有限，所以在此請求大家的幫忙捐助ㄧ些您能送費送出的標本與書集，本人將會統一整理後送給他們，讓我們一起盡我們一份單純的愛，謝謝~\n\n願意者請留言或私訊~\n已有幾隻蟲待命中(圖為高砂深山)\n\nP,S對不起，沒有運費補助~謝謝", "images": [], "species": "", "location": ""}, {"post_id": "10205059360791218", "post_url": "https://www.facebook.com/groups/506259886194307/posts/10205059360791218", "author": "", "timestamp": "2015-10-05", "text": "它在澳洲只分佈在Cape Tribulation到Mission Beach的沿海一帶。雖然沒有看到成蟲，不過還是很高興。它也是當初我來澳洲的原因之一。\nIn Australia, they only can be found in a limited coastal area, from Mission Beach to Cape Tribulation. Although I didn't find any adult, but I'm still very excited. It is one of my reason for coming to Australia.", "images": [], "species": "", "location": ""}, {"post_id": "3161880550632214", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3161880550632214", "author": "孫國鈞", "timestamp": "", "text": "請問\n這兩隻都是皮竹節蟲嗎？\n2025/8 大屯自然公園（陽明山）", "images": ["ab37b0ac232d39f6.jpg", "b81dae9e96e50e4e.jpg"], "species": "皮竹節蟲", "location": "自然公園"}, {"post_id": "3125985797555023", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3125985797555023", "author": "歐庭愷", "timestamp": "", "text": "請教可能分類群\n2025.05.17 屏東瑪家\n感恩", "images": ["e330ab1de46040e0.jpg", "4773036a7a442ba2.jpg"], "species": "", "location": "屏東"}, {"post_id": "3089432964543640", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3089432964543640", "author": "湯興漢", "timestamp": "", "text": "2025.06.01，新店二叭子植物園，請問這是雙色皮竹節蟲的公蟲跟母蟲嗎？", "images": ["9437609e3e5d9f77.jpg", "e61afed15ab6c116.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2792696524217287", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2792696524217287", "author": "孫國鈞", "timestamp": "", "text": "#台灣長肛竹節蟲？？？大屯自然公園 2024/8/18", "images": ["5487c194cbb41418.jpg", "23f0472779ba18b0.jpg", "9cfeba16a24bd20b.jpg"], "species": "台灣長肛竹節蟲", "location": "自然公園"}, {"post_id": "2763185293835077", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2763185293835077", "author": "孫國鈞", "timestamp": "", "text": "#日本棘竹節蟲？？？2024/7/14 二子坪步道", "images": ["b08979ada5385f8c.jpg", "c71cbb86f4a6150f.jpg", "34a71bf8fe165c9c.jpg"], "species": "日本棘竹節蟲", "location": "步道"}, {"post_id": "2748175425336064", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2748175425336064", "author": "孫國鈞", "timestamp": "", "text": "台灣長肛竹節蟲？？？\n陽明山夢幻湖戰備道 2024/6", "images": ["9e520169a6d64202.jpg", "93687517f0aa5457.jpg", "25cbc55a18caf0a9.jpg", "1c70fb80438904fc.jpg"], "species": "台灣長肛竹節蟲", "location": "陽明山"}, {"post_id": "2670370323116575", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2670370323116575", "author": "林彧綦", "timestamp": "", "text": "今天再次回到之前找到長肛的同一地點，希望能再帶幾隻雌蟲回去，解決雌雄比例懸殊的問題，結果雌蟲沒找到，反倒是找到了之前沒見過的物種...從其觸角明顯較長這點來看，應該是屬於長角棒䗛科皮䗛屬，但不確定具體是哪一個物種。比較明顯的特徵有全身呈深褐色，以及觸角末兩節呈白色前四張照片是一齡蟲、第五張是應該是同種的二齡蟲採集地：新北市瑞芳區金瓜石", "images": ["652539d8b0bc867f.jpg", "01002b069e5d3f17.jpg", "dd163686cbf086d1.jpg", "2321a853143b50cb.jpg", "0e91d154a445fa04.jpg"], "species": "未知（雌）", "location": "新北"}, {"post_id": "2655248467962094", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2655248467962094", "author": "鍾秉霖", "timestamp": "", "text": "純粹分享：杉林遇到的竹節蟲，我大概30年沒在野外遇到，已放回大自然！", "images": ["c5a4d678b18452ec.jpg", "e6cfa8264a8c38b9.jpg"], "species": "", "location": "野外"}, {"post_id": "2614516458701962", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2614516458701962", "author": "陳語霖  · 追蹤", "timestamp": "", "text": "想請教各位竹節蟲達人這是我在水漾森林山徑上遇見的竹節蟲寶寶海拔約2000初…… 查看更多", "images": ["daed159a0e825866.jpg", "9651f7caec3ed3fe.jpg"], "species": "", "location": "森林"}, {"post_id": "2566457716841170", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2566457716841170", "author": "孫國鈞", "timestamp": "", "text": "#短肛竹節蟲翠山步道 2023/10/5", "images": ["34798238539ce76a.jpg", "31d73c645b54a898.jpg"], "species": "短肛竹節蟲", "location": "步道"}];
// ─────────────────────────────────────────────────────────────────────────────

let activeFilters = { species: "", location: "" };
let searchQuery = "";

// 去除尾部的性別標註，取得物種基本名
function speciesBase(sp) {
  return sp ? sp.replace(/（[雌雄]+）$/, "").trim() : "";
}

function buildFilterLists() {
  // 物種以 baseName 分組計數
  const speciesCounts = {};
  const locationCounts = {};
  POSTS.forEach(p => {
    if (p.species) {
      const base = speciesBase(p.species);
      speciesCounts[base] = (speciesCounts[base] || 0) + 1;
    }
    if (p.location) locationCounts[p.location] = (locationCounts[p.location] || 0) + 1;
  });

  const sList = document.getElementById("species-list");
  document.getElementById("species-all-count").textContent = POSTS.length;
  Object.entries(speciesCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("species", name, li);
      sList.appendChild(li);
    });

  const lList = document.getElementById("location-list");
  document.getElementById("location-all-count").textContent = POSTS.length;
  Object.entries(locationCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("location", name, li);
      lList.appendChild(li);
    });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const list = type === "species"
    ? document.getElementById("species-list")
    : document.getElementById("location-list");
  list.querySelectorAll("li").forEach(li => li.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return POSTS.filter(p => {
    if (activeFilters.species && speciesBase(p.species) !== activeFilters.species) return false;
    if (activeFilters.location && p.location !== activeFilters.location) return false;
    if (q) {
      const haystack = [p.species, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("total-badge").textContent = `${posts.length} 筆`;

  if (posts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => {
    const imgHtml = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" loading="lazy" alt="">`
      : `<div class="card-no-img">🦗</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    return `
      <div class="card" onclick="openModal(${POSTS.indexOf(p)})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-species">${p.species || "（物種未知）"}</div>
          ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
          <div class="card-text">${p.text || ""}</div>
          <div class="card-meta">
            <span>${p.author || ""}</span>
            <span>${ts}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";

  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

buildFilterLists();
renderGrid();
</script>
</body>
