06259886194307/posts/2781759901977616", "author": "呂清", "timestamp": "2024-08-06", "text": "8/2攝於台中山區，海拔約2100公尺由照片中的比例尺可知體長不到8公分現場沒注意，回來看照片判斷應該是成蟲翻閱《台灣的竹節蟲》後，由像銅環的尾毛這個特徵猜測可能是楚南式小異竹節蟲，但分佈海拔遠高於書中所述的1200公尺，所以來社團請教各位前輩這隻是否為楚南式小異竹節蟲", "images": ["1a5bf6b2234bf99b.jpg", "d28f2b180da33ef0.jpg"], "species": "小異竹節蟲", "location": "海拔"}, {"post_id": "2764327823720824", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2764327823720824", "author": "簡廷仰", "timestamp": "2024-07-16", "text": "2023.6 桃園復興 海拔約1900\n請教可能的種類？感謝回覆", "images": ["ad2ca982a1f16457.jpg"], "species": "", "location": "海拔"}, {"post_id": "2763186660501607", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2763186660501607", "author": "孫國鈞", "timestamp": "2024-07-14", "text": "#短肛竹節蟲？？？\n二子坪步道 2024/7/14", "images": ["dc2ee044fa0f0ba7.jpg", "2401a9bedbc17a13.jpg", "9e6ac6d1e858319f.jpg", "7977e49f616c4cb6.jpg", "6b666300b975bb89.jpg"], "species": "短肛竹節蟲", "location": "步道"}, {"post_id": "2749071941913079", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2749071941913079", "author": "Formosa Pan", "timestamp": "2024-06-26", "text": "請教物種名？\n\n皮竹節蟲(雄成蟲)\n\n感謝林彧綦前輩的指導。\n\n2024/06/26于新北市新店區二趴子植物園", "images": ["48bad37eac14256a.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "2741721025981504", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2741721025981504", "author": "孫國鈞", "timestamp": "2024-06-17", "text": "#皮竹節蟲Phraortes sp. \n陽明山地區 2024/6", "images": ["b8975da92ece38ae.jpg"], "species": "皮竹節蟲", "location": "陽明山"}, {"post_id": "2739030586250548", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2739030586250548", "author": "孫國鈞", "timestamp": "2024-06-13", "text": "皮竹節蟲 雄成蟲（右圖局放）\n陽明山二子坪 2024/6⋯", "images": ["494b469621dc4960.jpg", "83e2001ecb3e3506.jpg"], "species": "皮竹節蟲", "location": "陽明山"}, {"post_id": "2737013973118876", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2737013973118876", "a 71851116424", "author": "孫國鈞", "timestamp": "2023-06-18", "text": "#日本棘竹節蟲  （雌 ）面天坪步道 2023/6/18", "images": ["032d0879d9b458ad.jpg", "a15b41ab6c9a9923.jpg", "532afeacec22653b.jpg"], "species": "日本棘竹節蟲", "location": "步道"}, {"post_id": "2483162898503986", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2483162898503986", "author": "孫國鈞", "timestamp": "2023-06-09", "text": "#截角華竹節蟲\n2023/6/9陽明山苗圃步道\n25°09'30.1\"N 121°32'49.5\"E", "images": ["e3d5f4612178ae50.jpg", "b5321556d3429a3e.jpg", "aaa966457232e937.jpg"], "species": "截角華竹節蟲", "location": "步道"}, {"post_id": "2479995888820687", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2479995888820687", "author": "葉宜欣", "timestamp": "2023-06-05", "text": "請問這是截角華竹節蟲嗎？ 謝謝\n112.6.5陽明山二子坪", "images": ["783740ae8bc8caec.jpg"], "species": "截角華竹節蟲", "location": "陽明山"}, {"post_id": "2202798059873806", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2202798059873806", "author": "", "timestamp": "2022-06-26", "text": "2022.06.26 墾丁國家公園\n津田氏大頭竹節蟲\nMegacrina tsudai \n本種為台灣唯一的保育類竹節蟲，禁止採集、觸摸。津田氏大頭竹節蟲為夜行性，如果想要觀察可以挑晚上出門觀賞，會比較容易找到", "images": ["25df7e62325a166a.jpg", "cda7018d8c51f75c.jpg"], "species": "", "location": ""}, {"post_id": "2184454385041507", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2184454385041507", "author": "", "timestamp": "2022-06-03", "text": "分享野外觀察．竹節蟲》\n若同好可判別類型，也請不吝賜教～\n時間：20220603\n發現地：面天山步道（海拔約500公尺）…… 查看更多", "images": ["686d5ad4198d5c05.jpg", "1f7cdd846d77f0fd.jpg", "2d83baf82947b44f.jpg", "d68f8651cd19b1b0.jpg"], "species": "", "location": ""}, {"post_id": "1999913633495584", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1999913633495584", "author": "", "timestamp": "2021-10-04", "text": "前陣子有天睡覺忘記關燈，半夜醒來看到房門外開趴了，頭燈照射範圍外還有三隻\n\n大雪山，海拔約2200，半夜不好拍照僅此一張，不知道是什麼竹節蟲", "images": [], "species": "", "location": ""}, {"post_id": "1876405812513034", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1876405812513034", "author": "", "timestamp": "2021-05-09", "text": "這是2021/4/10於宜蘭縣三星鄉龍泉步道採集的個體，參考黃世富先生著的《台灣的竹節蟲》，雖然胸部背板兩側沒有紅色帶狀條紋，但根據觸角長度、背板上的小顆粒，推論應為「粗粒皮竹節蟲」。只是比較好奇「雙色皮竹節蟲」和「台灣皮竹節蟲」身上難道完全都沒有小顆粒嗎?還是有但較不明顯?因為書、網路上的照片感覺都不是那麼清楚，希望各位如果有比較清晰的照片可以借我學習一下，謝謝~", "images": [], "species": "", "location": ""}, {"post_id": "1010006499152974", "post_url": "https://www.facebook.com/groups/506259886194307/posts/1010006499152974", "author": "", "timestamp": "2018-06-17", "text": "20180616嘉義縣竹崎鄉光華\n牛山步道\n雲霧帶吃咬人貓的竹節蟲,大約在3平方公尺的咬人貓上發現8隻竹節蟲,有褐色及綠色兩種色型.\n剛剛才看到版主傳授的辨識重點 不曉得有限的圖片能不能看出種類?請教大家這是?", "images": [], "species": "", "location": ""}, {"post_id": "818235838330042", "post_url": "https://www.facebook.com/groups/506259886194307/posts/818235838330042", "author": "", "timestamp": "2017-06-24", "text": "20170622嘉義縣隙頂之星步道\n顏色豐富，請問這隻是?\n皮竹節蟲，感謝廖文泉兄，湯興漢秒解!!\n另外感謝 楊柏晉回應 \" 應該是雙色皮竹節蟲\"", "images": [], "species": "", "location": ""}, {"post_id": "599163220237306", "post_url": "https://www.facebook.com/groups/506259886194307/posts/599163220237306", "author": "", "timestamp": "2016-04-18", "text": "***重要事項-竹節蟲的基本認識\n本篇將要教您如何看竹節蟲的特徵and雌雄的分辨方法\n\n特徵\n1.頭部+觸角(分科用，台灣產的話異竹節蟲科(Heteronemiidae)的觸角會>其足腿節。竹節蟲科(Phasmatidae)會<或=前足腿節，而瘤竹節是屬於枝竹節蟲科(Bacteriidae)的)\n\n2.步足，看看有無特殊的衍生物(突起或片狀等)\n\n3.翅膀，有翅無翅，翅膀顏色等可作為或輔助辨識\n\n4.*尾端，竹節蟲的肛門那邊有許多的片狀或突起，是最重要的辨識特徵，下肛片跟尾毛超級重要，一定要拍，雌雄也從這裡看\n\n5.卵，每一種竹節蟲的卵都不大一樣，若剛好有見到母蟲生蛋的話，卵也是很重要的特徵之一喔(型態、衍生物不同)\n\n分雌雄\n有的種類在身型或顏色上就有公母的不同了，很好辨認，其次就是看粗度，母蟲因為要產卵，通常較為肥胖粗壯，而公蟲則較瘦，體重也較輕\n，某些種類公蟲的觸角比較發達，而最準確的還是要看下肛片或生殖系統了\n\n所以，拍照時請拍\n1.頭+觸角+前足\n2.翅膀+中足\n3.屁股+尾毛\n4.全身照\n\n並請附上詳細地點，時間，海拔高度(有的話較好)\n\n以上，謝謝您的觀賞~", "images": [], "species": "", "location": ""}, {"post_id": "3161880550632214", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3161880550632214", "author": "孫國鈞", "timestamp": "", "text": "請問\n這兩隻都是皮竹節蟲嗎？\n2025/8 大屯自然公園（陽明山）", "images": ["ab37b0ac232d39f6.jpg", "b81dae9e96e50e4e.jpg"], "species": "皮竹節蟲", "location": "自然公園"}, {"post_id": "3125985797555023", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3125985797555023", "author": "歐庭愷", "timestamp": "", "text": "請教可能分類群\n2025.05.17 屏東瑪家\n感恩", "images": ["e330ab1de46040e0.jpg", "4773036a7a442ba2.jpg"], "species": "", "location": "屏東"}, {"post_id": "3092894580864145", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3092894580864145", "author": "Tony Yang", "timestamp": "", "text": "20250602\n東眼山區\n楚南氏小異及皮䗛屬", "images": ["442cbbe6bd311e19.jpg", "c40f3f5b60bd04e2.jpg"], "species": "", "location": ""}, {"post_id": "3089432964543640", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3089432964543640", "author": "湯興漢", "timestamp": "", "text": "2025.06.01，新店二叭子植物園，請問這是雙色皮竹節蟲的公蟲跟母蟲嗎？", "images": ["9437609e3e5d9f77.jpg", "e61afed15ab6c116.jpg"], "species": "皮竹節蟲", "location": "植物園"}, {"post_id": "3032733333546937", "post_url": "https://www.facebook.com/groups/506259886194307/posts/3032733333546937", "author": "Greene Chen", "timestamp": "", "text": "1140411台地步道\n求名？！感恩~", "images": ["9d8e13b3a3743c64.jpg", "9aa1b910a3754a9a.jpg", "b625b7df469015ce.jpg"], "species": "", "location": ""}, {"post_id": "2763185293835077", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2763185293835077", "author": "孫國鈞", "timestamp": "", "text": "#日本棘竹節蟲？？？2024/7/14 二子坪步道", "images": ["b08979ada5385f8c.jpg", "c71cbb86f4a6150f.jpg", "34a71bf8fe165c9c.jpg"], "species": "日本棘竹節蟲", "location": "步道"}, {"post_id": "2748175425336064", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2748175425336064", "author": "孫國鈞", "timestamp": "", "text": "台灣長肛竹節蟲？？？\n陽明山夢幻湖戰備道 2024/6", "images": ["9e520169a6d64202.jpg", "93687517f0aa5457.jpg", "25cbc55a18caf0a9.jpg", "1c70fb80438904fc.jpg"], "species": "台灣長肛竹節蟲", "location": "陽明山"}, {"post_id": "2614516458701962", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2614516458701962", "author": "陳語霖  · 追蹤", "timestamp": "", "text": "想請教各位竹節蟲達人這是我在水漾森林山徑上遇見的竹節蟲寶寶海拔約2000初…… 查看更多", "images": ["daed159a0e825866.jpg", "9651f7caec3ed3fe.jpg"], "species": "", "location": "森林"}, {"post_id": "2566457716841170", "post_url": "https://www.facebook.com/groups/506259886194307/posts/2566457716841170", "author": "孫國鈞", "timestamp": "", "text": "#短肛竹節蟲翠山步道 2023/10/5", "images": ["34798238539ce76a.jpg", "31d73c645b54a898.jpg"], "species": "短肛竹節蟲", "location": "步道"}];
// ─────────────────────────────────────────────────────────────────────────────

let activeFilters = { species: "", location: "" };
let searchQuery = "";

// 去除尾部的性別標註，取得物種基本名
function speciesBase(sp) {
  return sp ? sp.replace(/（[雌雄]+）$/, "").trim() : "";
}

function buildFilterLists() {
  // 物種以 baseName 分組計數
  const speciesCounts = {};
  const locationCounts = {};
  POSTS.forEach(p => {
    if (p.species) {
      const base = speciesBase(p.species);
      speciesCounts[base] = (speciesCounts[base] || 0) + 1;
    }
    if (p.location) locationCounts[p.location] = (locationCounts[p.location] || 0) + 1;
  });

  const sList = document.getElementById("species-list");
  document.getElementById("species-all-count").textContent = POSTS.length;
  Object.entries(speciesCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("species", name, li);
      sList.appendChild(li);
    });

  const lList = document.getElementById("location-list");
  document.getElementById("location-all-count").textContent = POSTS.length;
  Object.entries(locationCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, cnt]) => {
      const li = document.createElement("li");
      li.innerHTML = `${name} <span class="count">${cnt}</span>`;
      li.dataset.value = name;
      li.onclick = () => setFilter("location", name, li);
      lList.appendChild(li);
    });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const list = type === "species"
    ? document.getElementById("species-list")
    : document.getElementById("location-list");
  list.querySelectorAll("li").forEach(li => li.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return POSTS.filter(p => {
    if (activeFilters.species && speciesBase(p.species) !== activeFilters.species) return false;
    if (activeFilters.location && p.location !== activeFilters.location) return false;
    if (q) {
      const haystack = [p.species, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("total-badge").textContent = `${posts.length} 筆`;

  if (posts.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = posts.map((p, i) => {
    const imgHtml = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" loading="lazy" alt="">`
      : `<div class="card-no-img">🦗</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    return `
      <div class="card" onclick="openModal(${POSTS.indexOf(p)})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-species">${p.species || "（物種未知）"}</div>
          ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
          <div class="card-text">${p.text || ""}</div>
          <div class="card-meta">
            <span>${p.author || ""}</span>
            <span>${ts}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";

  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

buildFilterLists();
renderGrid();
</script>
